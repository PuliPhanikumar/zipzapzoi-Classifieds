<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ZipZapZoi - Search Results</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#019863",
              secondary: "#4D96A9",
              "background-light": "#f0f4f8",
              "background-dark": "#0d0d0d",
              "card-dark": "#1a1a1a"
            },
            fontFamily: { display: "Spline Sans" }
          }
        }
      };
      
      if (localStorage.getItem('zzz_theme') === 'dark' || (!('zzz_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24 }
      
      body { perspective: 1000px; }
      
      .card-3d {
        transform-style: preserve-3d;
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .card-3d:hover {
        transform: translateY(-8px) scale(1.02) rotateX(2deg) rotateY(-2deg);
        box-shadow: 0 30px 50px -15px rgba(0,0,0,0.2);
        z-index: 10;
      }
      .dark .card-3d:hover { box-shadow: 0 30px 50px -15px rgba(0,0,0,0.8); }
      
      .card-image-wrap { transition: transform 0.5s ease; }
      .card-3d:hover .card-image-wrap { transform: translateZ(20px); }

      .fav-btn {
        background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(4px);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #9ca3af;
      }
      .dark .fav-btn { background: rgba(0,0,0,0.5); }
      .fav-btn:hover { transform: scale(1.15); color: #ef4444; }
      .fav-btn.active { color: #ef4444; }
      .fav-btn.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }

      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
      .animate-float { animation: float 4s ease-in-out infinite; }
      
      @keyframes popIn { from { opacity:0; transform: scale(0.9) translateY(20px); } to { opacity:1; transform: scale(1) translateY(0); } }
      .animate-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="font-display min-h-screen flex flex-col bg-background-light dark:bg-background-dark text-gray-800 dark:text-gray-100 transition-colors duration-300">
    
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-card-dark/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800 shadow-sm transition-colors duration-300">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
        <div class="flex items-center justify-between">
          <a href="classifieds.html" class="flex items-center gap-2 group cursor-pointer text-gray-500 hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-2xl">arrow_back</span>
            <span class="font-bold hidden sm:block">Back to Explore</span>
          </a>
          
          <div class="flex items-center gap-4">
            <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
               <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-grow flex flex-col">
      
      <!-- INLINE SEARCH BAR -->
      <section class="bg-white dark:bg-card-dark border-b border-gray-200 dark:border-gray-800 py-6">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex flex-col sm:flex-row gap-4">
            <div class="flex-1 flex items-center bg-gray-50 dark:bg-gray-900 rounded-2xl px-6 h-14 border border-gray-200 dark:border-gray-700 focus-within:border-primary transition-colors">
              <span class="material-symbols-outlined text-gray-400">search</span>
              <input id="searchQuery" class="w-full bg-transparent border-none focus:ring-0 text-base ml-2 font-bold dark:text-white" placeholder="Search..." type="text" onkeypress="if(event.key === 'Enter') updateSearch()"/>
            </div>
            <button onclick="updateSearch()" class="h-14 px-8 bg-primary hover:bg-green-700 text-white font-bold rounded-2xl shadow-lg transition-transform active:scale-95">
              Update Search
            </button>
          </div>
        </div>
      </section>

      <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex flex-col lg:flex-row gap-8">
        
        <!-- SIDEBAR FILTERS -->
        <aside class="w-full lg:w-64 shrink-0 hidden lg:block">
          <div class="sticky top-[120px] bg-white dark:bg-card-dark p-6 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-sm">
            <h3 class="font-bold text-lg text-gray-900 dark:text-white mb-6 flex items-center gap-2">
              <span class="material-symbols-outlined">filter_list</span> Refine Results
            </h3>
            <div class="space-y-6">
              <div>
                <label class="block text-sm font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wide">Category</label>
                <select id="catFilter" onchange="renderResults()" class="w-full bg-gray-50 dark:bg-gray-800 border-none rounded-xl text-sm font-bold focus:ring-primary dark:text-white cursor-pointer">
                  <!-- Rendered via JS -->
                </select>
              </div>
              <div>
                <label class="block text-sm font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wide">Sort By</label>
                <select id="sortFilter" onchange="renderResults()" class="w-full bg-gray-50 dark:bg-gray-800 border-none rounded-xl text-sm font-bold focus:ring-primary dark:text-white cursor-pointer">
                  <option value="newest">Newest First</option>
                  <option value="price_low">Price: Low to High</option>
                  <option value="price_high">Price: High to Low</option>
                </select>
              </div>
            </div>
          </div>
        </aside>

        <!-- RESULTS AREA -->
        <div class="flex-1 min-w-0">
          <div class="mb-6">
            <h2 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">Search Results</h2>
            <p class="text-gray-500 dark:text-gray-400 font-bold mt-1" id="resultCount">Searching...</p>
          </div>

          <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
            <!-- 3D Cards rendered here via JS -->
          </div>

          <!-- 3D EMPTY STATE -->
          <div id="emptyState" class="hidden flex-col items-center justify-center py-16 text-center animate-pop">
             <div class="animate-float mb-8">
                 <div class="w-32 h-32 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center shadow-2xl border-4 border-white dark:border-card-dark">
                     <span class="material-symbols-outlined text-6xl text-blue-500">search_off</span>
                 </div>
             </div>
             <h2 class="text-3xl font-black text-gray-900 dark:text-white mb-2">No matches found</h2>
             <p class="text-gray-500 dark:text-gray-400 mb-8 max-w-md mx-auto">We couldn't find anything matching your search. Try adjusting your keywords or clearing your filters to see more listings.</p>
             <button onclick="clearSearch()" class="bg-primary hover:bg-green-700 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-xl transition-all transform active:scale-95">
                 Clear Search
             </button>
          </div>

        </div>
      </section>
    </main>

    <script src="js/schema.js"></script>
    <script src="js/utils.js"></script>
    <script>
      let currentQuery = '';
      let allListings = [];

      document.addEventListener('DOMContentLoaded', () => {
        if (document.documentElement.classList.contains('dark')) document.getElementById('themeIcon').textContent = 'light_mode';
        
        // Populate Dropdown from schema
        const catSelect = document.getElementById('catFilter');
        catSelect.innerHTML = '<option value="all">All Categories</option>' + 
          window.ZZZ_SCHEMA.categories.map(c => `<option value="${c.id}">${c.label}</option>`).join('');

        allListings = JSON.parse(localStorage.getItem('zzz_listings') || '[]');
        
        const params = new URLSearchParams(window.location.search);
        currentQuery = params.get('q') || '';
        document.getElementById('searchQuery').value = currentQuery;
        
        renderResults();
      });

      function updateSearch() {
        currentQuery = document.getElementById('searchQuery').value;
        const newUrl = window.location.pathname + '?q=' + encodeURIComponent(currentQuery);
        window.history.pushState({path:newUrl}, '', newUrl);
        renderResults();
      }

      function clearSearch() {
        document.getElementById('searchQuery').value = '';
        document.getElementById('catFilter').value = 'all';
        updateSearch();
      }

      function renderResults() {
        const grid = document.getElementById('resultsGrid');
        const empty = document.getElementById('emptyState');
        const count = document.getElementById('resultCount');

        const q = currentQuery.toLowerCase();
        const cat = document.getElementById('catFilter').value;
        const sort = document.getElementById('sortFilter').value;

        // Filter
        let filtered = allListings.filter(l => {
            const matchesQuery = !q || l.title.toLowerCase().includes(q) || l.description.toLowerCase().includes(q);
            const matchesCat = cat === 'all' || l.category === cat;
            return matchesQuery && matchesCat;
        });

        // Sort
        if(sort === 'price_low') filtered.sort((a,b) => a.price - b.price);
        if(sort === 'price_high') filtered.sort((a,b) => b.price - a.price);
        if(sort === 'newest') filtered.reverse();

        count.textContent = `Showing ${filtered.length} result${filtered.length === 1 ? '' : 's'} for "${currentQuery || 'All'}"`;

        if(filtered.length === 0) {
            grid.classList.add('hidden');
            empty.classList.remove('hidden');
            empty.classList.add('flex');
            return;
        }

        grid.classList.remove('hidden');
        empty.classList.add('hidden');
        empty.classList.remove('flex');

        const favs = JSON.parse(localStorage.getItem('zzz_favorites') || '[]');

        grid.innerHTML = filtered.map((l, index) => {
          const isFav = favs.includes(l.id);
          const timeDelay = index * 0.05;
          return `
            <div class="card-3d bg-white dark:bg-card-dark rounded-3xl overflow-hidden border border-gray-100 dark:border-gray-800 cursor-pointer relative group opacity-0 animate-pop" style="animation-delay: ${timeDelay}s" onclick="window.location.href='Listing Detail.html?id=${l.id}'">
              
              <div class="relative h-48 overflow-hidden bg-gray-100 dark:bg-gray-900">
                <img src="${l.images?.[0] || 'https://via.placeholder.com/400x300?text=No+Image'}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                
                <div class="absolute top-4 left-4 bg-white/90 dark:bg-black/70 backdrop-blur-sm px-3 py-1 rounded-full text-[10px] font-bold text-gray-800 dark:text-white uppercase tracking-wider card-image-wrap">
                  ${l.category}
                </div>

                <button onclick="event.stopPropagation(); toggleFav('${l.id}', this)" class="fav-btn absolute top-4 right-4 w-10 h-10 rounded-full flex items-center justify-center card-image-wrap ${isFav ? 'active' : ''}">
                  <span class="material-symbols-outlined text-xl">favorite</span>
                </button>
              </div>

              <div class="p-5">
                <div class="flex justify-between items-start mb-1">
                  <h3 class="text-base font-bold text-gray-900 dark:text-white truncate pr-2">${l.title}</h3>
                  <p class="text-lg font-black text-primary">₹${l.price.toLocaleString()}</p>
                </div>
                <div class="flex items-center gap-3 text-xs font-bold text-gray-400 dark:text-gray-500 mt-3">
                  <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">location_on</span> ${l.location || 'Local'}</span>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      function toggleFav(id, btn) {
        const user = JSON.parse(localStorage.getItem('zzz_user') || 'null');
        if(!user) {
          window.location.href = `Login Page.html?redirect=SearchResult.html?q=${currentQuery}`;
          return;
        }
        let favs = JSON.parse(localStorage.getItem('zzz_favorites') || '[]');
        if(favs.includes(id)) {
          favs = favs.filter(f => f !== id);
          btn.classList.remove('active');
        } else {
          favs.push(id);
          btn.classList.add('active');
        }
        localStorage.setItem('zzz_favorites', JSON.stringify(favs));
      }
    </script>
</body>
</html>
