<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>ZipZapZoi - Listing Details</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#019863",
            "secondary": "#4D96A9",
            "background-light": "#F7F9FC"
          },
          fontFamily: { "display": ["Spline Sans", "sans-serif"] },
          boxShadow: { "bouncy": "0 10px 20px -5px rgba(0,0,0,.1)" }
        }
      }
    }
  </script>
  <style>
    /* Hide scrollbar for gallery */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-display bg-background-light text-gray-800 min-h-screen flex flex-col">

  <header class="bg-white border-b sticky top-0 z-50">
    <div class="container mx-auto px-6 h-16 flex items-center justify-between">
      <a href="classifieds.html" class="flex items-center gap-2 text-primary font-bold text-xl">
        <span class="material-symbols-outlined text-3xl">all_inclusive</span>
        ZipZapZoi
      </a>
      <div class="flex items-center gap-4">
   <button onclick="history.back()" class="hidden md:flex items-center gap-1 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-full font-bold text-xs transition-colors">
      <span class="material-symbols-outlined text-sm">arrow_back</span> Back
   </button>
   
   <div id="navAvatar" class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center font-bold">U</div>
</div>
    </div>
  </header>

  <main class="flex-grow container mx-auto px-4 py-8">
    
    <div class="text-sm text-gray-400 mb-6 flex items-center gap-2">
      <a href="classifieds.html" class="hover:text-primary">Home</a> <span class="material-symbols-outlined text-xs">chevron_right</span>
      <span id="crumbCat">Category</span> <span class="material-symbols-outlined text-xs">chevron_right</span>
      <span id="crumbTitle" class="text-gray-800 font-bold truncate max-w-[200px]">Item</span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-2 space-y-4">
        <div class="bg-white rounded-3xl shadow-sm border overflow-hidden h-[400px] md:h-[500px] relative group bg-gray-100 flex items-center justify-center">
           <img id="mainImage" src="https://via.placeholder.com/800" class="w-full h-full object-contain transition-opacity duration-300">
           <span id="statusBadge" class="hidden absolute top-4 left-4 bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold uppercase shadow-lg z-10">SOLD</span>
        </div>

        <div id="imageGallery" class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
           </div>
      </div>

      <div class="space-y-6">
        <div class="bg-white p-6 rounded-3xl shadow-bouncy border border-gray-100">
           <div class="flex justify-between items-start">
             <div>
               <p id="detailCat" class="text-xs font-bold text-primary uppercase tracking-wider mb-1">CATEGORY</p>
               <h1 id="detailTitle" class="text-2xl font-bold text-gray-900 leading-tight">Loading Title...</h1>
             </div>
             <button onclick="toggleFav()" class="p-2 bg-gray-50 rounded-full hover:bg-red-50 hover:text-red-500 transition-colors">
               <span id="favIcon" class="material-symbols-outlined">favorite</span>
             </button>
           </div>
           
           <div class="mt-4 pb-6 border-b border-gray-100">
             <h2 id="detailPrice" class="text-4xl font-black text-gray-900">₹ 0</h2>
             <p class="text-gray-400 text-sm mt-1 flex items-center gap-1">
               <span class="material-symbols-outlined text-sm">location_on</span> <span id="detailLoc">Location</span>
               <span class="mx-1">•</span> <span id="detailTime">Just now</span>
             </p>
           </div>

           <div id="actionArea" class="mt-6 flex flex-col gap-3"></div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md transition-shadow" onclick="goToProfile()">
          <h3 class="font-bold text-gray-400 text-xs uppercase mb-4">Sold By</h3>
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center text-xl font-bold text-gray-500" id="sellerInit">?</div>
            <div>
              <p id="sellerName" class="font-bold text-gray-900">Seller Name</p>
              <p class="text-xs text-primary font-bold">View Profile</p>
            </div>
            <span class="material-symbols-outlined ml-auto text-gray-300">chevron_right</span>
          </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
          <h3 class="font-bold text-gray-900 mb-3">Description</h3>
          <p id="detailDesc" class="text-gray-600 text-sm leading-relaxed whitespace-pre-line">No description.</p>
          <div id="dynamicFields" class="mt-4 grid grid-cols-2 gap-2 text-xs"></div>
        </div>

      </div>
    </div>

  </main>

  <footer class="bg-white border-t py-6 text-center text-sm text-gray-500 mt-auto">
    &copy; 2024 ZipZapZoi
  </footer>

  <script>
    // --- 1. DATA SOURCE ---
    const mockListings = [
        { id: '101', title: "iPhone 14 Pro", category: "Electronics", price: "65000", location: "Bengaluru", time: "2 hrs ago", image: "https://images.unsplash.com/photo-1695048133142-1a20484d2569?auto=format&fit=crop&w=600&q=80", images: ["https://images.unsplash.com/photo-1695048133142-1a20484d2569?auto=format&fit=crop&w=600&q=80"], userId: 'user_bob', userName: 'Bob Builder' },
        { id: '102', title: "Royal Enfield 350", category: "Vehicles", price: "145000", location: "Mumbai", time: "5 hrs ago", image: "https://images.unsplash.com/photo-1558981403-c5f9899a28bc?auto=format&fit=crop&w=600&q=80", userId: 'user_alice', userName: 'Alice W' },
    ];

    // --- 2. INIT ---
    const urlParams = new URLSearchParams(window.location.search);
    const itemId = urlParams.get('id');
    const currentUser = JSON.parse(localStorage.getItem('zzz_user'));
    let currentItem = null;

    if(currentUser) document.getElementById('navAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

    function loadItem() {
      // MERGE DATA
      const userPosts = JSON.parse(localStorage.getItem('zzz_listings') || '[]');
      const allListings = [...userPosts, ...mockListings];
      
      currentItem = allListings.find(i => i.id === itemId);

      if(!currentItem) {
        document.body.innerHTML = `<div class="h-screen flex flex-col items-center justify-center text-center p-4">
          <span class="material-symbols-outlined text-6xl text-gray-300 mb-4">search_off</span>
          <h1 class="text-2xl font-bold text-gray-700">Listing Not Found</h1>
          <a href="classifieds.html" class="mt-4 bg-primary text-white px-6 py-2 rounded-full font-bold">Back to Classifieds</a>
        </div>`;
        return;
      }

      // TEXT DETAILS
      document.title = currentItem.title;
      document.getElementById('crumbTitle').textContent = currentItem.title;
      document.getElementById('crumbCat').textContent = currentItem.category;
      
      document.getElementById('detailCat').textContent = currentItem.category;
      document.getElementById('detailTitle').textContent = currentItem.title;
      document.getElementById('detailPrice').textContent = "₹ " + currentItem.price;
      document.getElementById('detailLoc').textContent = currentItem.city || currentItem.location;
      document.getElementById('detailDesc').textContent = currentItem.description || "No description provided.";
      
      document.getElementById('sellerName').textContent = currentItem.userName || "User";
      document.getElementById('sellerInit').textContent = (currentItem.userName || "U").charAt(0).toUpperCase();

      if(currentItem.status === 'sold') {
          document.getElementById('statusBadge').classList.remove('hidden');
          document.getElementById('mainImage').classList.add('grayscale');
      }

      // --- 3. GALLERY LOGIC ---
      const mainImg = document.getElementById('mainImage');
      const gallery = document.getElementById('imageGallery');
      
      // Default to main image
      mainImg.src = currentItem.image || 'https://via.placeholder.com/800';

      // Check for array of images
      const imgList = (currentItem.images && currentItem.images.length > 0) 
                      ? currentItem.images 
                      : [currentItem.image || 'https://via.placeholder.com/800'];

      // Generate Thumbnails
      if (imgList.length > 1) {
          gallery.innerHTML = imgList.map((src, index) => `
              <img src="${src}" onclick="swapImage(this)" 
                   class="w-20 h-20 rounded-xl object-cover cursor-pointer border-2 ${index === 0 ? 'border-primary' : 'border-transparent'} hover:border-primary transition-all opacity-80 hover:opacity-100 flex-shrink-0"
                   data-src="${src}">
          `).join('');
      } else {
          gallery.classList.add('hidden'); // Hide strip if only 1 photo
      }

      renderActionButtons();
    }

    // Function to swap main image
    window.swapImage = (el) => {
        const main = document.getElementById('mainImage');
        // Reset all borders
        document.querySelectorAll('#imageGallery img').forEach(img => img.classList.replace('border-primary', 'border-transparent'));
        // Set active border
        el.classList.replace('border-transparent', 'border-primary');
        // Fade effect
        main.style.opacity = '0.5';
        setTimeout(() => {
            main.src = el.dataset.src;
            main.style.opacity = '1';
        }, 150);
    }

    // --- 4. BUTTONS ---
    function renderActionButtons() {
      const area = document.getElementById('actionArea');
      
      if(currentUser && currentItem.userId === currentUser.id) {
        area.innerHTML = `
          <button onclick="editItem()" class="w-full bg-gray-800 text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-black transition-transform active:scale-95 flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">edit_square</span> Edit Listing
          </button>
          <button onclick="deleteItem()" class="w-full bg-white text-red-500 border border-red-100 font-bold py-3.5 rounded-xl hover:bg-red-50 transition-colors flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">delete</span> Delete
          </button>
        `;
      } else {
        const isSold = currentItem.status === 'sold';
        area.innerHTML = `
          <button onclick="startChat()" ${isSold ? 'disabled' : ''} class="w-full bg-secondary text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-cyan-700 transition-transform active:scale-95 flex items-center justify-center gap-2 ${isSold ? 'opacity-50 cursor-not-allowed' : ''}">
            <span class="material-symbols-outlined">chat</span> ${isSold ? 'Item Sold' : 'Chat with Seller'}
          </button>
          <button onclick="callSeller()" class="w-full bg-white text-primary border border-green-100 font-bold py-3.5 rounded-xl hover:bg-green-50 transition-colors flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">call</span> Show Phone Number
          </button>
        `;
      }
    }

    // --- ACTIONS ---
    function startChat() {
      if(!currentUser) return window.location.href = `Login Page.html?redirect=Listing Detail.html?id=${itemId}`;
      const intent = { action: 'start_chat', partnerId: currentItem.userId, partnerName: currentItem.userName, listingId: currentItem.id, listingTitle: currentItem.title };
      localStorage.setItem('zzz_chat_intent', JSON.stringify(intent));
      window.location.href = "Inbox.html";
    }

    function editItem() { window.location.href = `Post Listing.html?id=${itemId}`; }

    function deleteItem() {
      if(!confirm("Delete this listing?")) return;
      let list = JSON.parse(localStorage.getItem('zzz_listings') || '[]');
      list = list.filter(i => i.id !== itemId);
      localStorage.setItem('zzz_listings', JSON.stringify(list));
      alert("Deleted.");
      window.location.href = "Seller Dashboard.html";
    }

    function callSeller() { alert("Phone: +91 98XXX XXXXX"); }
    function goToProfile() { if(currentItem.userId) window.location.href = `profile.html?sellerId=${currentItem.userId}`; }

    // FAVORITES
    window.toggleFav = () => {
        const icon = document.getElementById('favIcon');
        let favs = JSON.parse(localStorage.getItem('zzz_favorites') || '[]');
        const exists = favs.find(f => f.id === itemId);
        if(exists) {
            favs = favs.filter(f => f.id !== itemId);
            icon.classList.remove('text-red-500'); icon.style.fontVariationSettings = "'FILL' 0";
        } else {
            favs.push(currentItem);
            icon.classList.add('text-red-500'); icon.style.fontVariationSettings = "'FILL' 1";
        }
        localStorage.setItem('zzz_favorites', JSON.stringify(favs));
    }

    loadItem();
  </script>
</body>
</html>
