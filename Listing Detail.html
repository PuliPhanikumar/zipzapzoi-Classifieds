<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ZipZapZoi - Listing Details</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#019863",
              secondary: "#4D96A9",
              "background-light": "#f0f4f8",
              "background-dark": "#0f172a",
              "card-dark": "#1e293b"
            },
            fontFamily: { display: "Spline Sans" }
          }
        }
      };
      
      if (localStorage.getItem('zzz_theme') === 'dark' || (!('zzz_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24 }
      
      /* Modern Image Gallery (Airbnb Style) */
      .gallery-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        grid-template-rows: repeat(2, 250px);
        gap: 0.5rem;
        border-radius: 1.5rem;
        overflow: hidden;
      }
      @media (max-width: 768px) {
        .gallery-grid { grid-template-columns: 1fr; grid-template-rows: 300px; }
        .gallery-item:not(:first-child) { display: none; }
      }
      .gallery-item {
        width: 100%; height: 100%; object-fit: cover;
        transition: transform 0.5s ease, filter 0.3s;
        cursor: pointer;
      }
      .gallery-item:hover {
        transform: scale(1.05);
        filter: brightness(1.1);
      }
      .gallery-grid:hover .gallery-item:not(:hover) {
        filter: brightness(0.8);
      }
      .main-img { grid-row: span 2; }

      /* Sticky Action Box */
      .sticky-box {
        position: sticky;
        top: 100px;
        transform-style: preserve-3d;
        perspective: 1000px;
      }
      .action-card {
        transition: transform 0.3s;
      }
      .action-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      }
      .dark .action-card:hover {
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
      }

      /* Micro Animations */
      @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
      .animate-in { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="font-display min-h-screen flex flex-col bg-background-light dark:bg-background-dark text-gray-800 dark:text-gray-100 transition-colors duration-300">
    
    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-card-dark/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
        <div class="flex items-center justify-between">
          <a href="classifieds.html" class="flex items-center gap-2 group cursor-pointer text-gray-500 hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-2xl">arrow_back</span>
            <span class="font-bold hidden sm:block">Back to Search</span>
          </a>
          
          <div class="flex items-center gap-4">
            <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
               <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
            </button>
            <button onclick="shareListing()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400" title="Share">
               <span class="material-symbols-outlined">ios_share</span>
            </button>
            <button onclick="toggleFav()" id="favBtnHeader" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400" title="Save">
               <span class="material-symbols-outlined">favorite</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-in" id="contentArea" style="opacity: 0;">
      
      <!-- IMAGE GALLERY -->
      <section class="mb-10">
        <div class="gallery-grid" id="imageGallery">
          <!-- Rendered via JS -->
          <div class="bg-gray-200 dark:bg-gray-800 w-full h-full animate-pulse rounded-2xl main-img"></div>
          <div class="bg-gray-200 dark:bg-gray-800 w-full h-full animate-pulse rounded-2xl"></div>
          <div class="bg-gray-200 dark:bg-gray-800 w-full h-full animate-pulse rounded-2xl"></div>
        </div>
      </section>

      <!-- CONTENT GRID -->
      <section class="flex flex-col lg:flex-row gap-10 relative">
        
        <!-- Left: Details -->
        <div class="w-full lg:w-2/3">
          <div class="mb-6 flex justify-between items-start">
            <div>
              <span id="detailCategory" class="text-xs font-bold bg-primary/10 text-primary px-3 py-1 rounded-full uppercase tracking-wider mb-3 inline-block">Category</span>
              <h1 id="detailTitle" class="text-3xl sm:text-4xl font-black text-gray-900 dark:text-white leading-tight mb-2">Loading...</h1>
              <div class="flex flex-wrap items-center gap-4 text-sm font-bold text-gray-500 dark:text-gray-400">
                <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">location_on</span> <span id="detailLocation">Location</span></span>
                <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">schedule</span> <span id="detailTime">Time</span></span>
                <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">visibility</span> <span id="detailViews">0</span> views</span>
              </div>
            </div>
          </div>

          <hr class="border-gray-200 dark:border-gray-800 my-8">

          <!-- Description -->
          <div class="mb-8">
            <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Description</h2>
            <div id="detailDescription" class="prose dark:prose-invert max-w-none text-gray-600 dark:text-gray-300 leading-relaxed whitespace-pre-wrap font-medium">
              Loading description...
            </div>
          </div>

          <hr class="border-gray-200 dark:border-gray-800 my-8">

          <!-- Attributes Area (if any) -->
          <div class="mb-8" id="attributesSection" style="display: none;">
            <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Specific Details</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="attributesGrid">
               <!-- Injected -->
            </div>
          </div>

        </div>

        <!-- Right: Sticky Action Box -->
        <div class="w-full lg:w-1/3">
          <div class="sticky-box">
            <div class="action-card bg-white dark:bg-card-dark rounded-3xl p-6 border border-gray-100 dark:border-gray-800 shadow-xl relative overflow-hidden">
              <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-secondary to-primary"></div>
              
              <div class="mb-6">
                <p class="text-gray-500 dark:text-gray-400 font-bold text-sm uppercase tracking-wider mb-1">Asking Price</p>
                <h2 id="detailPrice" class="text-4xl font-black text-gray-900 dark:text-white">₹0</h2>
                <p id="conditionBadge" class="text-xs font-bold bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 px-2 py-1 rounded mt-2 inline-block">Used</p>
              </div>

              <!-- Seller Info -->
              <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-800/50 rounded-2xl mb-6 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" onclick="alert('View Profile feature coming soon!')">
                <div class="flex items-center gap-3">
                  <div class="w-12 h-12 rounded-full bg-primary flex items-center justify-center text-white font-bold text-xl shadow-inner">
                    <span id="sellerInit">S</span>
                  </div>
                  <div>
                    <p id="sellerName" class="font-bold text-gray-900 dark:text-white">Seller Name</p>
                    <p class="text-xs font-bold text-gray-500 dark:text-gray-400 flex items-center gap-1"><span class="material-symbols-outlined text-[14px] text-blue-500">verified</span> Verified Member</p>
                  </div>
                </div>
                <span class="material-symbols-outlined text-gray-400">chevron_right</span>
              </div>

              <div class="space-y-3">
                <button onclick="initiateChat()" class="w-full py-4 rounded-xl bg-primary hover:bg-green-700 text-white font-bold shadow-lg shadow-primary/30 transition-transform active:scale-95 flex items-center justify-center gap-2">
                  <span class="material-symbols-outlined">chat</span> Chat with Seller
                </button>
                <button onclick="alert('Make Offer coming soon!')" class="w-full py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 font-bold text-gray-700 dark:text-gray-300 hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary transition-colors">
                  Make Offer
                </button>
              </div>

              <div class="mt-6 flex items-center justify-center gap-2 text-xs font-bold text-gray-400 dark:text-gray-500">
                <span class="material-symbols-outlined text-[16px]">security</span> Protected by ZipZapZoi Secure
              </div>
            </div>
            
            <div class="mt-4 text-center">
              <button onclick="alert('Report submitted.')" class="text-xs font-bold text-red-400 hover:text-red-600 transition-colors flex items-center justify-center gap-1 mx-auto">
                <span class="material-symbols-outlined text-[14px]">flag</span> Report this listing
              </button>
            </div>

          </div>
        </div>

      </section>
    </main>

    <script src="js/schema.js"></script>
    <script src="js/utils.js"></script>
    <script>
      let currentListing = null;
      let isFavorite = false;

      document.addEventListener('DOMContentLoaded', () => {
        if (document.documentElement.classList.contains('dark')) document.getElementById('themeIcon').textContent = 'light_mode';
        
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if(!id) {
            alert('Listing not found');
            window.location.href = 'classifieds.html';
            return;
        }

        const listings = JSON.parse(localStorage.getItem('zzz_listings') || '[]');
        currentListing = listings.find(l => l.id === id);

        if(!currentListing) {
            alert('Listing not found or deleted');
            window.location.href = 'classifieds.html';
            return;
        }

        // Simulate Views
        currentListing.views = (currentListing.views || 0) + 1;
        localStorage.setItem('zzz_listings', JSON.stringify(listings));

        renderData();
      });

      function renderData() {
        document.getElementById('detailTitle').textContent = currentListing.title;
        document.getElementById('detailCategory').textContent = currentListing.category;
        document.getElementById('detailPrice').textContent = `₹${parseFloat(currentListing.price).toLocaleString()}`;
        document.getElementById('detailLocation').textContent = currentListing.location || 'Local';
        document.getElementById('detailTime').textContent = currentListing.date || 'Just now';
        document.getElementById('detailViews').textContent = currentListing.views || 1;
        document.getElementById('detailDescription').textContent = currentListing.description;
        
        document.getElementById('sellerName').textContent = currentListing.userName || 'Anonymous Seller';
        document.getElementById('sellerInit').textContent = (currentListing.userName || 'A').charAt(0).toUpperCase();

        if(currentListing.condition) {
           document.getElementById('conditionBadge').textContent = currentListing.condition.toUpperCase();
        } else {
           document.getElementById('conditionBadge').style.display = 'none';
        }

        // Dynamic Attributes
        if (currentListing.dynamicData && Object.keys(currentListing.dynamicData).length > 0) {
            const grid = document.getElementById('attributesGrid');
            const section = document.getElementById('attributesSection');
            let html = '';
            
            const brainFields = (window.ZZZ_SCHEMA && window.ZZZ_SCHEMA.fields) ? window.ZZZ_SCHEMA.fields : [];

            Object.entries(currentListing.dynamicData).forEach(([key, val]) => {
                if(!val) return;
                const fieldDef = brainFields.find(f => f.id === key);
                const label = fieldDef ? fieldDef.label : key.replace(/_/g, ' ').toUpperCase();
                
                html += `
                  <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded-xl border border-gray-100 dark:border-gray-700">
                    <p class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">${label}</p>
                    <p class="font-bold text-gray-900 dark:text-white text-sm truncate" title="${val}">${val}</p>
                  </div>
                `;
            });

            if (html !== '') {
                grid.innerHTML = html;
                section.style.display = 'block';
            } else {
                section.style.display = 'none';
            }
        } else {
            document.getElementById('attributesSection').style.display = 'none';
        }

        // Gallery
        const images = currentListing.images || [];
        const gallery = document.getElementById('imageGallery');
        if(images.length > 0) {
            gallery.innerHTML = images.map((img, i) => `
               <img src="${img}" class="gallery-item ${i === 0 ? 'main-img' : ''}" onclick="window.open('${img}', '_blank')">
            `).join('');
        } else {
            gallery.innerHTML = `<img src="https://via.placeholder.com/800x600?text=No+Images+Provided" class="gallery-item main-img">`;
        }

        // Check Fav
        const favs = JSON.parse(localStorage.getItem('zzz_favorites') || '[]');
        isFavorite = favs.includes(currentListing.id);
        updateFavIcon();
      }

      function updateFavIcon() {
        const btn = document.getElementById('favBtnHeader');
        if(isFavorite) {
            btn.classList.add('text-red-500');
            btn.classList.remove('text-gray-600', 'dark:text-gray-400');
            btn.querySelector('span').style.fontVariationSettings = "'FILL' 1";
        } else {
            btn.classList.remove('text-red-500');
            btn.classList.add('text-gray-600', 'dark:text-gray-400');
            btn.querySelector('span').style.fontVariationSettings = "'FILL' 0";
        }
      }

      function toggleFav() {
        const user = JSON.parse(localStorage.getItem('zzz_user') || 'null');
        if(!user) {
            window.location.href = 'Login Page.html?redirect=Listing Detail.html?id=' + currentListing.id;
            return;
        }

        let favs = JSON.parse(localStorage.getItem('zzz_favorites') || '[]');
        if(isFavorite) {
            favs = favs.filter(f => f !== currentListing.id);
            isFavorite = false;
        } else {
            favs.push(currentListing.id);
            isFavorite = true;
        }
        localStorage.setItem('zzz_favorites', JSON.stringify(favs));
        updateFavIcon();
      }

      function shareListing() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            alert('Listing link copied to clipboard!');
        });
      }

      function initiateChat() {
        const user = JSON.parse(localStorage.getItem('zzz_user') || 'null');
        if(!user) {
            window.location.href = 'Login Page.html?redirect=Listing Detail.html?id=' + currentListing.id;
            return;
        }
        if(user.email === currentListing.userEmail) {
            alert("You cannot chat with yourself!");
            return;
        }
        // Redirect to Inbox with context
        window.location.href = `Inbox.html?chatWith=${encodeURIComponent(currentListing.userEmail || currentListing.userName)}&ref=${currentListing.id}`;
      }
    </script>
</body>
</html>
