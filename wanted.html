<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Post a Request — ZipZapZoi</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#019863",
            secondary: "#4D96A9",
            "background-light": "#f0f4f8",
            "background-dark": "#0f172a",
            "card-dark": "#1e293b"
          },
          fontFamily: { display: "Spline Sans" }
        }
      }
    };
    if (localStorage.getItem('zzz_theme') === 'dark' || (!('zzz_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24 }
    .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .dark .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .mesh-bg {
        background-color: #f0f4f8;
        background-image: radial-gradient(at 40% 20%, hsla(160,100%,74%,1) 0px, transparent 50%),
        radial-gradient(at 80% 0%, hsla(189,100%,56%,1) 0px, transparent 50%),
        radial-gradient(at 0% 50%, hsla(355,100%,93%,1) 0px, transparent 50%);
    }
    .dark .mesh-bg {
        background-color: #0f172a;
        background-image: radial-gradient(at 40% 20%, hsla(160,50%,20%,1) 0px, transparent 50%),
        radial-gradient(at 80% 0%, hsla(189,50%,20%,1) 0px, transparent 50%),
        radial-gradient(at 0% 50%, hsla(355,20%,10%,1) 0px, transparent 50%);
    }
    .step-fade { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  <script src="js/schema.js"></script>
  <script src="js/utils.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet"/>



<style id="zzz-logo-styles">
  @keyframes bounce-gentle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  @keyframes bounce-in-letter {
    0% { opacity: 0; transform: translateY(-15px) scale(0.9); }
    50% { opacity: 1; transform: translateY(3px) scale(1.05); }
    75% { transform: translateY(-1px) scale(0.98); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .animate-bounce-in {
    opacity: 0;
    display: inline-block;
    animation: bounce-in-letter 0.5s cubic-bezier(0.28, 0.84, 0.42, 1) forwards;
  }
  .animate-logo-bouncy {
    animation: bounce-gentle 3s infinite ease-in-out;
  }
</style>



<link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet"/>
</head>
<body class="font-display min-h-screen flex flex-col text-gray-800 dark:text-gray-100 mesh-bg transition-colors duration-500">
  
  <header class="sticky top-0 z-50 glass-panel shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 group cursor-pointer">
              <img src="images/infinity-only.png" alt="ZipZapZoi Logo" class="h-10 md:h-12 object-contain animate-logo-bouncy">
              <h2 class="tracking-tight flex items-baseline gap-1">
                <span class="text-2xl md:text-3xl font-black" style="font-family: 'Fredoka One', cursive;">
                  <span style="color: #0066ff;">ZipZap</span><span style="color: #ff007f;">Zoi</span>
                </span>
                <span class="text-xl md:text-2xl text-black flex items-baseline" style="font-family: 'Righteous', cursive; text-shadow: 1px 1px 0 #999, 2px 2px 0 #555, 3px 3px 4px rgba(0,0,0,0.5);">
                  <span class="animate-bounce-in" style="animation-delay: 0.1s">C</span><span class="animate-bounce-in" style="animation-delay: 0.15s">l</span><span class="animate-bounce-in" style="animation-delay: 0.2s">a</span><span class="animate-bounce-in" style="animation-delay: 0.25s">s</span><span class="animate-bounce-in" style="animation-delay: 0.3s">s</span><span class="animate-bounce-in" style="animation-delay: 0.35s">i</span><span class="animate-bounce-in" style="animation-delay: 0.4s">f</span><span class="animate-bounce-in" style="animation-delay: 0.45s">i</span><span class="animate-bounce-in" style="animation-delay: 0.5s">e</span><span class="animate-bounce-in" style="animation-delay: 0.55s">d</span><span class="animate-bounce-in" style="animation-delay: 0.6s">s</span>
                </span>
              </h2>
            </a>
        <div class="flex items-center gap-4" id="headerAuthArea">
          <a href="classifieds.html" class="hidden sm:flex items-center gap-1 text-sm font-bold text-gray-600 dark:text-gray-300 hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-[18px]">storefront</span> Browse Ads
          </a>
          <button onclick="toggleDarkMode()" aria-label="Toggle Dark Mode" class="p-2 rounded-full hover:bg-white/50 dark:hover:bg-black/20 transition-colors">
             <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
          </button>
          <div id="authContainer"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 py-12 w-full flex flex-col items-center">
    
    <div class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-black mb-4 bg-gradient-to-r from-blue-600 to-primary bg-clip-text text-transparent">What are you looking for?</h1>
      <p class="text-lg text-gray-600 dark:text-gray-300 font-medium">Post a detailed request and let sellers come to you.</p>
    </div>

    <!-- MAIN FORM CONTAINER -->
    <div class="glass-panel w-full rounded-3xl p-6 md:p-10 shadow-2xl relative overflow-hidden">
        
        <!-- STEP 1: CATEGORY -->
        <div id="step1" class="step-fade">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><span class="material-symbols-outlined text-primary">category</span> Select Category</h3>
            <div id="categoryGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
        </div>

        <!-- STEP 2: DETAILS -->
        <div id="step2" class="step-fade hidden space-y-8">
            <div class="flex items-center justify-between border-b border-gray-200 dark:border-gray-700 pb-4">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary" id="selectedCatIcon">category</span>
                    <span id="selectedCatName">Category</span>
                </h3>
                <button onclick="goBack()" class="text-sm font-bold text-blue-600 hover:underline flex items-center gap-1">
                    <span class="material-symbols-outlined text-[16px]">arrow_back</span> Change
                </button>
            </div>

            <!-- Title -->
            <div>
                <label class="block text-sm font-bold mb-2">Request Title *</label>
                <input type="text" id="reqTitle" class="w-full bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 font-bold focus:ring-primary focus:bg-white dark:focus:bg-gray-800 transition-all" placeholder="e.g. Looking for a used iPhone 13 Pro">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Subcategory -->
                <div>
                    <label class="block text-sm font-bold mb-2">Subcategory *</label>
                    <select id="reqSubcat" class="w-full bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 font-bold focus:ring-primary focus:bg-white dark:focus:bg-gray-800 transition-all" required></select>
                </div>
                <!-- Location -->
                <div>
                    <label class="block text-sm font-bold mb-2">State *</label>
                    <select id="reqState" class="w-full bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 font-bold focus:ring-primary focus:bg-white dark:focus:bg-gray-800 transition-all" required></select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">City *</label>
                    <select id="reqCity" class="w-full bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 font-bold focus:ring-primary focus:bg-white dark:focus:bg-gray-800 transition-all" disabled required></select>
                </div>
            </div>

            <!-- Dynamic Fields Container -->
            <div id="dynamicFieldsArea" class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white/30 dark:bg-black/10 p-6 rounded-2xl border border-gray-200 dark:border-gray-700 hidden">
            </div>

            <!-- Budget -->
            <div class="bg-primary/5 dark:bg-primary/10 p-6 rounded-2xl border border-primary/20">
                <h4 class="font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">payments</span> Budget Range</h4>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">Min (₹)</label>
                        <input type="number" id="reqMin" class="w-full bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 font-bold focus:ring-primary" value="0">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">Max (₹)</label>
                        <input type="number" id="reqMax" class="w-full bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 font-bold focus:ring-primary" placeholder="Optional">
                    </div>
                </div>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-sm font-bold mb-2">Detailed Description</label>
                <textarea id="reqDesc" rows="4" class="w-full bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 font-bold focus:ring-primary focus:bg-white dark:focus:bg-gray-800 transition-all" placeholder="Describe any specific requirements, condition preferences, or deal-breakers..."></textarea>
            </div>

            <!-- Submit -->
            <button onclick="submitRequest()" id="submitBtn" class="w-full bg-gradient-to-r from-primary to-emerald-500 text-white font-black py-4 rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all flex items-center justify-center gap-2 text-lg">
                <span class="material-symbols-outlined">send</span> Post Wanted Ad
            </button>
        </div>
    </div>
  </main>

  <script>
    let currentUser = null;
    let schema = {};
    let currentCategoryKey = null;
    let currentCategory = null;

    document.addEventListener("DOMContentLoaded", async () => {
      currentUser = getCurrentUser();
      if (!currentUser) {
          window.location.href = 'Login Page.html?redirect=wanted.html';
          return;
      }

      // Load Schema
      try {
          const res = await fetch('/api/schema.php').then(r => r.json());
          let brain = (res.success && res.data && res.data.source !== 'default') ? res.data : ZZZ_SCHEMA;
          
          if(brain.categories) {
              brain.categories.forEach(cat => {
                  let mySubs = (brain.subcategories||[]).filter(s => s.categoryId === cat.id);
                  schema[cat.id] = {
                      label: cat.label,
                      icon: cat.icon,
                      color: cat.color || 'text-primary',
                      subs: mySubs.map(s => s.label)
                  };
              });
              renderCategoryGrid();
          }
      } catch(e) {
          console.error(e);
      }

      // Populate States
      if(window.INDIA_STATES) {
          const stateSelect = document.getElementById('reqState');
          stateSelect.innerHTML = '<option value="">Select State</option>';
          Object.keys(window.INDIA_STATES).forEach(state => {
              stateSelect.innerHTML += `<option value="${state}">${state}</option>`;
          });
          stateSelect.addEventListener('change', e => {
              const s = e.target.value;
              const citySelect = document.getElementById('reqCity');
              citySelect.innerHTML = '<option value="">Select City</option>';
              if(s && window.INDIA_STATES[s]) {
                  window.INDIA_STATES[s].forEach(city => {
                      citySelect.innerHTML += `<option value="${city}">${city}</option>`;
                  });
                  citySelect.disabled = false;
              } else {
                  citySelect.disabled = true;
              }
          });
      }
    });

    function renderCategoryGrid() {
        const grid = document.getElementById('categoryGrid');
        grid.innerHTML = '';
        Object.keys(schema).forEach(key => {
            const cat = schema[key];
            const div = document.createElement('div');
            div.className = "cursor-pointer flex flex-col items-center justify-center p-6 rounded-2xl bg-white/60 dark:bg-gray-800/60 hover:bg-white dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700 shadow-sm hover:shadow-md transition-all gap-3 group";
            div.innerHTML = `<span class="material-symbols-outlined text-5xl ${cat.color} group-hover:scale-110 transition-transform">${cat.icon}</span><span class="text-sm font-black text-center">${cat.label}</span>`;
            div.onclick = () => selectCategory(key);
            grid.appendChild(div);
        });
    }

    function selectCategory(key) {
        currentCategoryKey = key;
        currentCategory = schema[key];
        
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        
        document.getElementById('selectedCatIcon').textContent = currentCategory.icon;
        document.getElementById('selectedCatName').textContent = currentCategory.label;
        document.getElementById('selectedCatIcon').className = `material-symbols-outlined ${currentCategory.color}`;

        const subcatEl = document.getElementById('reqSubcat');
        subcatEl.innerHTML = '<option value="">Select Subcategory...</option>';
        currentCategory.subs.forEach(s => {
            subcatEl.innerHTML += `<option value="${s}">${s}</option>`;
        });

        // Trigger dynamic fields on subcategory change
        subcatEl.onchange = (e) => {
            renderDynamicFields(e.target.value);
        };
        
        // Initial clear
        document.getElementById('dynamicFieldsArea').innerHTML = '';
        document.getElementById('dynamicFieldsArea').classList.add('hidden');
    }

    function renderDynamicFields(subcategoryLabel) {
        const area = document.getElementById('dynamicFieldsArea');
        area.innerHTML = '';
        area.classList.add('hidden');
        
        if(!subcategoryLabel) return;

        let brain = null;
        try { brain = JSON.parse(localStorage.getItem('zzz_classifieds_schema')); } catch(e){}
        if(!brain) brain = ZZZ_SCHEMA;
        
        const subcatObj = (brain.subcategories||[]).find(s => s.label === subcategoryLabel && s.categoryId === currentCategoryKey);
        if(!subcatObj) return;

        const catFields = (brain.category_fields||[]).filter(cf => cf.categoryId === currentCategoryKey && (!cf.subcategoryId || cf.subcategoryId === subcatObj.id));
        
        if(catFields.length > 0) {
            area.classList.remove('hidden');
            catFields.forEach(cf => {
                const field = (brain.fields||[]).find(f => f.id === cf.fieldId);
                if(!field) return;

                const wrapper = document.createElement('div');
                let inputHtml = '';
                
                if (field.type === 'select' && field.options) {
                    const opts = field.options.map(o => `<option value="${o}">${o}</option>`).join('');
                    inputHtml = `<select id="dyn_${field.id}" class="w-full bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 font-bold focus:ring-primary" ${field.required?'required':''}>
                        <option value="">Any</option>${opts}
                    </select>`;
                } else if (field.type === 'boolean') {
                    inputHtml = `<select id="dyn_${field.id}" class="w-full bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 font-bold focus:ring-primary" ${field.required?'required':''}>
                        <option value="">Any</option><option value="Yes">Yes</option><option value="No">No</option>
                    </select>`;
                } else {
                    inputHtml = `<input type="${field.type==='number'?'number':'text'}" id="dyn_${field.id}" class="w-full bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 font-bold focus:ring-primary" placeholder="Any" ${field.required?'required':''}>`;
                }

                wrapper.innerHTML = `<label class="block text-sm font-bold mb-2">${field.label} ${field.required?'*':''}</label>${inputHtml}`;
                area.appendChild(wrapper);
            });
        }
    }

    function goBack() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
    }

    async function submitRequest() {
        const title = document.getElementById('reqTitle').value.trim();
        const subcat = document.getElementById('reqSubcat').value;
        const state = document.getElementById('reqState').value;
        const city = document.getElementById('reqCity').value;
        
        if(!title) { showToast('Please enter a title', 'error'); return; }
        if(!subcat) { showToast('Please select a subcategory', 'error'); return; }
        if(!state || !city) { showToast('Please select your location', 'error'); return; }

        // Gather dynamic fields
        const dynamic_data = {};
        const area = document.getElementById('dynamicFieldsArea');
        const inputs = area.querySelectorAll('input[id^="dyn_"], select[id^="dyn_"]');
        let failedRequired = false;
        inputs.forEach(input => {
            if(input.required && !input.value) failedRequired = true;
            if(input.value) {
                dynamic_data[input.id.replace('dyn_', '')] = input.value;
            }
        });

        if(failedRequired) { showToast('Please fill all required custom fields', 'error'); return; }

        const payload = {
            title,
            category: currentCategory.label,
            subcategory: subcat,
            location_state: state,
            location_city: city,
            budget_min: document.getElementById('reqMin').value,
            budget_max: document.getElementById('reqMax').value || 0,
            description: document.getElementById('reqDesc').value,
            dynamic_data
        };

        const btn = document.getElementById('submitBtn');
        const ogText = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Posting...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/wanted.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify(payload)
            }).then(r=>r.json());

            if(res.success) {
                showToast('Wanted request posted successfully!', 'success');
                setTimeout(() => window.location.href = 'classifieds.html', 1500);
            } else {
                showToast(res.error || 'Failed to post request', 'error');
                btn.innerHTML = ogText;
                btn.disabled = false;
            }
        } catch(e) {
            showToast('Network error', 'error');
            btn.innerHTML = ogText;
            btn.disabled = false;
        }
    }
  </script>
</body>
</html>
