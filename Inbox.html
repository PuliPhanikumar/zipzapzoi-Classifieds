  <script>
    const currentUser = JSON.parse(localStorage.getItem('zzz_user'));
    const STORAGE_KEY = 'zzz_messages';
    
    document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

    // --- 1. DATA LOADING ---
    function getConversations() {
      const allMsgs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const convMap = {};

      allMsgs.forEach(msg => {
        const participants = [msg.fromUserId, msg.toUserId].sort().join('_');
        const convId = `${participants}_${msg.listingId}`;

        if (!convMap[convId]) {
          convMap[convId] = {
            id: convId,
            listingId: msg.listingId,
            listingTitle: msg.listingTitle,
            otherUser: msg.fromUserId === currentUser.id ? msg.toName : msg.fromName,
            lastMsg: msg,
            unreadCount: 0
          };
        }
        
        if (new Date(msg.timestamp) > new Date(convMap[convId].lastMsg.timestamp)) {
          convMap[convId].lastMsg = msg;
        }
        
        if(msg.toUserId === currentUser.id && !msg.read) {
           convMap[convId].unreadCount++;
        }
      });

      return Object.values(convMap).sort((a, b) => new Date(b.lastMsg.timestamp) - new Date(a.lastMsg.timestamp));
    }

    let activeConvId = null;

    function renderList() {
      const list = getConversations();
      const container = document.getElementById('conversationList');
      const search = document.getElementById('searchBox').value.toLowerCase();

      if (list.length === 0) {
        container.innerHTML = `<div class="p-8 text-center text-gray-400"><p>No messages yet.</p></div>`;
        return;
      }

      container.innerHTML = list
        .filter(c => c.listingTitle.toLowerCase().includes(search) || (c.lastMsg.text && c.lastMsg.text.toLowerCase().includes(search)))
        .map(c => {
          const isActive = c.id === activeConvId;
          const date = new Date(c.lastMsg.timestamp).toLocaleDateString([], {month:'short', day:'numeric'});
          
          return `
          <div onclick="openChat('${c.id}')" class="flex gap-3 p-4 cursor-pointer hover:bg-gray-50 dark:bg-gray-800 border-b border-gray-100 dark:border-gray-800 transition-colors ${isActive ? 'bg-blue-50 border-l-4 border-l-primary' : 'border-l-4 border-l-transparent'}">
            <div class="w-12 h-12 rounded-full bg-gray-200 dark:bg-gray-800 flex-shrink-0 flex items-center justify-center font-bold text-gray-500 dark:text-gray-400">${c.otherUser ? c.otherUser.charAt(0) : '?'}</div>
            <div class="flex-1 min-w-0">
              <div class="flex justify-between items-baseline mb-1">
                <h4 class="font-bold text-gray-800 dark:text-white truncate text-sm">${c.otherUser || 'User'}</h4>
                <span class="text-xs text-gray-400 whitespace-nowrap">${date}</span>
              </div>
              <p class="text-xs text-gray-500 dark:text-gray-400 truncate mb-1">${c.listingTitle}</p>
              <div class="flex justify-between items-center">
                 <p class="text-sm text-gray-600 dark:text-gray-300 truncate ${c.unreadCount > 0 ?'font-bold text-gray-900 dark:text-white':''}">${c.lastMsg.text}</p>
                 ${c.unreadCount > 0 ? `<span class="bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full ml-2">${c.unreadCount}</span>` : ''}
              </div>
            </div>
          </div>
          `;
        }).join('');
    }

    // --- 2. OPEN CHAT ---
    function openChat(convId) {
      activeConvId = convId;
      
      const allMsgs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      let updated = false;
      const parts = convId.split('_'); 
      const listingId = parts[2]; 

      const msgs = allMsgs.filter(m => {
         const p = [m.fromUserId, m.toUserId].sort().join('_');
         const isMatch = `${p}_${m.listingId}` === convId;
         if(isMatch && m.toUserId === currentUser.id && !m.read) {
             m.read = true; updated = true;
         }
         return isMatch;
      }).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

      if(updated) { localStorage.setItem(STORAGE_KEY, JSON.stringify(allMsgs)); renderList(); }
      
      // UI Updates
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('chatArea').classList.remove('hidden');
      document.getElementById('activeChat').classList.remove('hidden');
      
      // Mobile
      if(window.innerWidth < 768) { document.getElementById('sidebar').classList.add('hidden'); }

      // Identify Other User
      let otherName = 'User';
      let listTitle = 'Listing';
      
      if(msgs.length > 0) {
         otherName = msgs[0].fromUserId === currentUser.id ? msgs[0].toName : msgs[0].fromName;
         listTitle = msgs[0].listingTitle;
      } else {
         // Fallback if opening empty/new chat
         // This relies on activeConvId or external set
      }

      document.getElementById('chatName').textContent = otherName || 'User';
      document.getElementById('chatAvatar').textContent = (otherName || '?').charAt(0);
      document.getElementById('contextTitle').textContent = listTitle;
      document.getElementById('contextLink').href = `Listing Detail.html?id=${listingId}`;
      
      // Try to load real listing details for context banner
      const listings = JSON.parse(localStorage.getItem('zzz_listings') || '[]');
      const listData = listings.find(l => l.id === listingId);
      if (listData) {
          document.getElementById('contextPrice').textContent = `₹${listData.price}`;
          document.getElementById('contextImg').style.backgroundImage = `url('${listData.image}')`;
      } else {
          document.getElementById('contextPrice').textContent = '';
          document.getElementById('contextImg').style.backgroundImage = `url('https://via.placeholder.com/150')`;
      }

      const feed = document.getElementById('messagesFeed');
      feed.innerHTML = msgs.map(m => {
        const isMe = m.fromUserId === currentUser.id;
        return `
          <div class="flex w-full ${isMe ? 'justify-end' : 'justify-start'} slide-in">
            <div class="msg-bubble px-4 py-2 rounded-xl shadow-sm relative text-sm ${isMe ? 'bg-bubble-me dark:bg-primary text-gray-800 dark:text-white rounded-tr-none' : 'bg-white dark:bg-card-dark text-gray-800 dark:text-white rounded-tl-none'}">
              ${m.text}
              <div class="msg-time ${isMe ? 'text-green-800 dark:text-green-100' : 'text-gray-400'}">${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} 
              ${isMe ? '<span class="material-symbols-outlined text-[10px] text-blue-500 align-middle ml-1">done_all</span>' : ''}</div>
            </div>
          </div>
        `;
      }).join('');
      
      feed.scrollTop = feed.scrollHeight;
    }

    // --- 3. CHECK FOR NEW CHAT INTENT ---
    function checkChatIntent() {
        const intentRaw = localStorage.getItem('zzz_chat_intent');
        if (!intentRaw) return;

        const intent = JSON.parse(intentRaw);
        localStorage.removeItem('zzz_chat_intent'); // Clear it immediately

        // 1. Search for existing conversation
        const allMsgs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const existingMsg = allMsgs.find(m => 
            (m.fromUserId === intent.partnerId && m.toUserId === currentUser.id) ||
            (m.fromUserId === currentUser.id && m.toUserId === intent.partnerId)
        );

        if (existingMsg) {
            // Found existing -> Open it
            const participants = [existingMsg.fromUserId, existingMsg.toUserId].sort().join('_');
            const convId = `${participants}_${existingMsg.listingId}`;
            openChat(convId);
        } else {
            // 2. Start NEW Chat Interface
            startNewChatUI(intent);
        }
    }

    function startNewChatUI(intent) {
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('chatArea').classList.remove('hidden');
        document.getElementById('activeChat').classList.remove('hidden');
        if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');

        // Setup Draft UI
        document.getElementById('chatName').textContent = intent.partnerName || "User";
        document.getElementById('chatAvatar').textContent = (intent.partnerName || "?").charAt(0).toUpperCase();
        
        // Context Banner
        document.getElementById('contextTitle').textContent = intent.listingTitle || "Direct Message";
        
        const listings = JSON.parse(localStorage.getItem('zzz_listings') || '[]');
        const listData = listings.find(l => l.id === intent.listingId);
        if (listData) {
            document.getElementById('contextPrice').textContent = `₹${listData.price}`;
            document.getElementById('contextImg').style.backgroundImage = `url('${listData.image}')`;
            document.getElementById('contextLink').href = `Listing Detail.html?id=${intent.listingId}`;
        } else {
            document.getElementById('contextPrice').textContent = ""; 
            document.getElementById('contextImg').style.backgroundImage = `url('https://via.placeholder.com/150')`;
            document.getElementById('contextLink').href = "#";
        }

        // Generate a temporary ID
        const pIds = [currentUser.id, intent.partnerId].sort().join('_');
        activeConvId = `${pIds}_${intent.listingId || 'general'}`;

        // Clear Feed with Welcome Message
        document.getElementById('messagesFeed').innerHTML = `
            <div class="text-center text-gray-400 text-sm mt-10">
                <p>Starting new chat with <span class="font-bold">${intent.partnerName}</span></p>
                <p>Say Hi! 👋</p>
            </div>
        `;
        
        // Store temp data on the input for the sendMessage function
        document.getElementById('msgInput').dataset.tempPartnerId = intent.partnerId;
        document.getElementById('msgInput').dataset.tempPartnerName = intent.partnerName;
    }

    // --- 4. SEND MESSAGE ---
    function sendMessage() {
      const txt = document.getElementById('msgInput').value.trim();
      if(!txt || !activeConvId) return;

      const allMsgs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const parts = activeConvId.split('_');
      
      // Determine Receiver
      let otherUserId = parts[0] === currentUser.id ? parts[1] : parts[0];
      let otherName = document.getElementById('chatName').textContent;
      let listTitle = document.getElementById('contextTitle').textContent;
      let listId = parts[2];

      // Handle "Draft/New" mode where parts might vary or be 'general'
      if(document.getElementById('msgInput').dataset.tempPartnerId) {
          otherUserId = document.getElementById('msgInput').dataset.tempPartnerId;
          otherName = document.getElementById('msgInput').dataset.tempPartnerName;
          delete document.getElementById('msgInput').dataset.tempPartnerId; // Clear draft flag
      }

      const newMsg = {
        id: 'msg_' + Date.now(),
        fromUserId: currentUser.id,
        fromName: currentUser.name,
        toUserId: otherUserId,
        toName: otherName,
        listingId: listId,
        listingTitle: listTitle,
        text: txt,
        timestamp: new Date().toISOString(),
        read: false
      };

      allMsgs.push(newMsg);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allMsgs));
      
      document.getElementById('msgInput').value = '';
      openChat(activeConvId); // Reload to show real message
      renderList(); // Update sidebar
      
      // Auto-Reply Sim (Optional)
      setTimeout(() => {
         simulateReply(activeConvId, otherUserId, otherName, listId, listTitle);
      }, 2000);
    }

    function simulateReply(convId, userId, userName, listId, listTitle) {
      // Basic simulation logic...
      const replies = ["Okay, sounds good.", "Can you share more info?", "I am interested."];
      const replyMsg = {
        id: 'msg_' + Date.now(),
        fromUserId: userId,
        fromName: userName,
        toUserId: currentUser.id,
        toName: currentUser.name,
        listingId: listId,
        listingTitle: listTitle,
        text: replies[Math.floor(Math.random() * replies.length)],
        timestamp: new Date().toISOString(),
        read: false
      };
      const allMsgs = JSON.parse(localStorage.getItem(STORAGE_KEY));
      allMsgs.push(replyMsg);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allMsgs));
      if (activeConvId === convId) openChat(convId);
      renderList();
    }

    function setInput(text) {
      document.getElementById('msgInput').value = text;
      document.getElementById('msgInput').focus();
    }

    function closeChatMobile() {
      document.getElementById('activeChat').classList.add('hidden');
      document.getElementById('sidebar').classList.remove('hidden');
      activeConvId = null;
      renderList();
    }
    function closeChatDesktop() {
      document.getElementById('activeChat').classList.add('hidden');
      document.getElementById('emptyState').classList.remove('hidden');
      activeConvId = null;
      renderList();
    }

    document.getElementById('msgInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendMessage();
    });

    document.getElementById('searchBox').addEventListener('input', renderList);

    // Initial Load
    renderList();
    checkChatIntent(); // <--- CRITICAL: Check for new chats on load

// CSRF Token Management
function generateCsrfToken() {
    return 'csrf_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
}

function getCsrfToken() {
    let token = sessionStorage.getItem('csrf_token');
    if (!token) {
        token = generateCsrfToken();
        sessionStorage.setItem('csrf_token', token);
    }
    return token;
}

function setCsrfToken() {
    const token = getCsrfToken();
    const inputs = document.querySelectorAll('input[name="csrf_token"]');
    inputs.forEach(input => input.value = token);
}

// Input Validation Functions
function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePhone(phone) {
    const digits = phone.replace(/\D/g, '');
    return digits.length === 10;
}

function validatePrice(price) {
    const num = parseFloat(price);
    return !isNaN(num) && num > 0 && num < 1000000;
}

function validatePassword(password) {
    return password.length >= 8 &&
           /[a-z]/.test(password) &&
           /[A-Z]/.test(password) &&
           /[0-9]/.test(password);
}

// Input Sanitization
function sanitizeInput(input) {
    const div = document.createElement('div');
    div.textContent = input;
    return div.innerHTML;
}

function sanitizeHTML(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    return div.textContent;
}

// Error/Success Messages
function showError(message) {
    let errorDiv = document.getElementById('errorMessage');
    if (!errorDiv) {
        errorDiv = document.createElement('div');
        errorDiv.id = 'errorMessage';
        errorDiv.style.cssText = 'color: red; padding: 10px; margin: 10px 0; border: 1px solid red; border-radius: 4px; display: none;';
        const form = document.querySelector('form');
        if (form) form.parentElement.insertBefore(errorDiv, form);
    }
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
    errorDiv.setAttribute('role', 'alert');
}

function showSuccess(message) {
    let successDiv = document.getElementById('successMessage');
    if (!successDiv) {
        successDiv = document.createElement('div');
        successDiv.id = 'successMessage';
        successDiv.style.cssText = 'color: green; padding: 10px; margin: 10px 0; border: 1px solid green; border-radius: 4px; display: none;';
        const form = document.querySelector('form');
        if (form) form.parentElement.insertBefore(successDiv, form);
    }
    successDiv.textContent = message;
    successDiv.style.display = 'block';
    successDiv.setAttribute('role', 'status');
}

function hideError() {
    const errorDiv = document.getElementById('errorMessage');
    if (errorDiv) errorDiv.style.display = 'none';
}

function hideSuccess() {
    const successDiv = document.getElementById('successMessage');
    if (successDiv) successDiv.style.display = 'none';
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    setCsrfToken();
});

  </script>
