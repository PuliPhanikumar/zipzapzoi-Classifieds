             <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>

    <main class="flex-1 flex-col bg-[#efeae2] dark:bg-background-dark relative hidden md:flex" id="chatArea">
      
      <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-center p-8 bg-gray-50 dark:bg-gray-800 z-0">
        <div class="w-40 h-40 bg-green-100 rounded-full flex items-center justify-center mb-6 text-green-500">
           <span class="material-symbols-outlined text-7xl">chat</span>
        </div>
        <h2 class="text-2xl font-bold text-gray-700 dark:text-gray-200 mb-2">Select a Conversation</h2>
        <p class="text-gray-500 dark:text-gray-400 max-w-sm">Choose a chat from the left to view messages or negotiate prices.</p>

      <div id="activeChat" class="flex flex-col h-full hidden z-10 w-full bg-[#efeae2] dark:bg-background-dark">
        
        <div class="bg-white dark:bg-card-dark px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between shadow-sm">

           <button class="bg-white dark:bg-card-dark border border-gray-200 dark:border-gray-700 rounded-full px-3 py-1 text-xs font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:bg-gray-800 hover:text-primary shadow-sm whitespace-nowrap transition-colors" onclick="setInput('I am interested!')">I am interested!</button>

    <script>
    // â”€â”€â”€ AUTH â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const currentUser = JSON.parse(localStorage.getItem('zzz_user') || 'null');
    if (!currentUser) {
      window.location.href = 'Login Page.html?redirect=Inbox.html';
      throw new Error('Not authenticated');
    }

    document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

    // Dark mode
    function toggleDarkMode() {
      const dark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('zzz_theme', dark ? 'dark' : 'light');
      document.getElementById('themeIcon').textContent = dark ? 'light_mode' : 'dark_mode';
    }
    if (document.documentElement.classList.contains('dark')) document.getElementById('themeIcon').textContent = 'light_mode';

    // â”€â”€â”€ STATE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    let allThreads   = [];
    let activeThread = null;   // { otherId, listingId, otherName }
    let pollTimer    = null;

    // â”€â”€â”€ 1. LOAD INBOX â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    async function loadInbox() {
      try {
        const res  = await fetch('/api/messages.php', { credentials: 'include' });
        const data = await res.json();
        if (!data.success) return;
        allThreads = data.data || [];
        renderList();
      } catch(e) {}
    }

    // â”€â”€â”€ 2. RENDER CONVERSATION LIST â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function renderList() {
      const container = document.getElementById('conversationList');
      const q = (document.getElementById('searchBox').value || '').toLowerCase();

      const filtered = allThreads.filter(t =>
        (t.other_user_name || '').toLowerCase().includes(q) ||
        (t.listing_title   || '').toLowerCase().includes(q) ||
        (t.last_message    || '').toLowerCase().includes(q)
      );

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="p-8 text-center text-gray-400 flex flex-col items-center gap-4">
            <span class="material-symbols-outlined text-5xl text-gray-300">chat_bubble_outline</span>
            <div>
              <p class="font-bold text-gray-600 dark:text-gray-300 mb-1">No messages yet</p>
              <p class="text-sm">Click "Chat with Seller" on any listing to start.</p>
            </div>
            <a href="classifieds.html" class="mt-2 px-5 py-2.5 bg-primary text-white font-bold rounded-xl text-sm hover:bg-green-700 transition-all">Browse Listings</a>
          </div>`;
        return;
      }

      container.innerHTML = filtered.map(t => {
        const isActive = activeThread &&
          activeThread.otherId  == t.other_user_id &&
          String(activeThread.listingId) === String(t.listing_id || 0);
        const date    = new Date(t.last_time).toLocaleDateString([], { month:'short', day:'numeric' });
        const preview = esc(t.last_message || '');

        return `
          <div onclick="openThread(${t.other_user_id}, ${t.listing_id || 0}, '${esc(t.other_user_name || 'User')}')"
               class="flex gap-3 p-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 border-b border-gray-100 dark:border-gray-800 transition-colors ${isActive ? 'bg-blue-50 dark:bg-blue-900/20 border-l-4 border-l-primary' : 'border-l-4 border-l-transparent'}">
            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-secondary to-primary flex-shrink-0 flex items-center justify-center font-bold text-white shadow-sm">
              ${(t.other_user_name || '?').charAt(0).toUpperCase()}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex justify-between items-baseline mb-0.5">
                <h4 class="font-bold text-gray-800 dark:text-white truncate text-sm">${esc(t.other_user_name || 'User')}</h4>
                <span class="text-[11px] text-gray-400 whitespace-nowrap ml-2">${date}</span>
              </div>
              <p class="text-xs text-gray-400 dark:text-gray-500 truncate mb-1">${esc(t.listing_title || 'General')}</p>
              <div class="flex justify-between items-center">
                <p class="text-sm text-gray-600 dark:text-gray-300 truncate ${t.unread_count > 0 ? 'font-bold text-gray-900 dark:text-white' : ''}">${preview}</p>
                ${t.unread_count > 0 ? '<span class="bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full ml-2 flex-shrink-0">' + t.unread_count + '</span>' : ''}
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // â”€â”€â”€ 3. OPEN THREAD â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    async function openThread(otherId, listingId, otherName) {
      activeThread = { otherId, listingId: listingId || 0, otherName };

      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('chatArea').classList.remove('hidden');
      document.getElementById('activeChat').classList.remove('hidden');
      if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');

      document.getElementById('chatName').textContent   = otherName || 'User';
      document.getElementById('chatAvatar').textContent = (otherName || '?').charAt(0).toUpperCase();

      if (listingId) {
        fetch('/api/listings.php?id=' + listingId, { credentials: 'include' })
          .then(r => r.json()).then(d => {
            if (!d.success) return;
            const l = d.data.listing;
            document.getElementById('contextTitle').textContent = l.title || 'Listing';
            document.getElementById('contextPrice').textContent =
              l.price_type === 'free' ? 'FREE' : '\u20b9' + parseFloat(l.price||0).toLocaleString('en-IN');
            const img = Array.isArray(l.images) && l.images[0] ? l.images[0] : '';
            document.getElementById('contextImg').style.backgroundImage = "url('" + img + "')";
            document.getElementById('contextLink').href = 'Listing Detail.html?id=' + l.id;
          }).catch(() => {});
      } else {
        document.getElementById('contextTitle').textContent = 'Direct Message';
        document.getElementById('contextPrice').textContent = '';
        document.getElementById('contextImg').style.backgroundImage = '';
        document.getElementById('contextLink').href = '#';
      }

      document.getElementById('messagesFeed').innerHTML =
        '<div class="flex justify-center items-center h-full py-10"><span class="material-symbols-outlined text-4xl text-gray-300">hourglass_empty</span></div>';

      try {
        const params = new URLSearchParams({ thread: otherId });
        if (listingId) params.set('listing_id', listingId);
        const res  = await fetch('/api/messages.php?' + params, { credentials: 'include' });
        const data = await res.json();
        if (data.success) renderMessages(data.data || []);
        await loadInbox();
      } catch(e) {}

      clearInterval(pollTimer);
      pollTimer = setInterval(refreshThread, 15000);
    }

    async function refreshThread() {
      if (!activeThread) return;
      try {
        const { otherId, listingId } = activeThread;
        const params = new URLSearchParams({ thread: otherId });
        if (listingId) params.set('listing_id', listingId);
        const res  = await fetch('/api/messages.php?' + params, { credentials: 'include' });
        const data = await res.json();
        if (data.success) renderMessages(data.data || []);
      } catch(e) {}
    }

    // â”€â”€â”€ 4. RENDER MESSAGES â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function renderMessages(msgs) {
      const feed   = document.getElementById('messagesFeed');
      const bottom = feed.scrollHeight - feed.clientHeight <= feed.scrollTop + 80;

      if (!msgs || msgs.length === 0) {
        feed.innerHTML = '<div class="flex flex-col items-center justify-center h-full py-20 text-gray-400 gap-2"><span class="material-symbols-outlined text-5xl">chat_bubble_outline</span><p class="text-sm">No messages yet. Say hello!</p></div>';
        return;
      }

      feed.innerHTML = msgs.map(m => {
        const isMe = String(m.from_user_id) === String(currentUser.id);
        const side = isMe
          ? 'bg-bubble-me dark:bg-primary text-gray-800 dark:text-white rounded-tr-none'
          : 'bg-white dark:bg-card-dark text-gray-800 dark:text-white rounded-tl-none';
        const time = new Date(m.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        return '<div class="flex w-full ' + (isMe?'justify-end':'justify-start') + ' slide-in">' +
          '<div class="msg-bubble px-4 py-2 rounded-xl shadow-sm text-sm ' + side + '">' +
          sanitizeInput(m.body || '') +
          '<div class="msg-time ' + (isMe?'text-green-800 dark:text-green-100':'text-gray-400') + '">' + time +
          (isMe ? ' <span class="material-symbols-outlined text-[10px] text-blue-500 align-middle ml-1">done_all</span>' : '') +
          '</div></div></div>';
      }).join('');

      if (bottom || msgs.length <= 5) feed.scrollTop = feed.scrollHeight;
    }

    // â”€â”€â”€ 5. SEND MESSAGE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const txt   = input.value.trim();
      if (!txt || !activeThread) return;

      const { otherId, listingId } = activeThread;
      input.value = '';

      const feed = document.getElementById('messagesFeed');
      const div  = document.createElement('div');
      div.className = 'flex w-full justify-end slide-in';
      div.innerHTML = '<div class="msg-bubble px-4 py-2 rounded-xl shadow-sm text-sm bg-bubble-me dark:bg-primary text-gray-800 dark:text-white rounded-tr-none">' +
        sanitizeInput(txt) +
        '<div class="msg-time text-green-800 dark:text-green-100">Sending\u2026</div></div>';
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;

      try {
        const body = { to_user_id: otherId, body: txt, subject: 'Message' };
        if (listingId) body.listing_id = listingId;
        const res  = await fetch('/api/messages.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!data.success) { showToast(data.error || 'Send failed.', 'error'); return; }
        await refreshThread();
        await loadInbox();
      } catch { showToast('Network error. Try again.', 'error'); }
    }

    // â”€â”€â”€ 6. CHAT INTENT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function checkChatIntent() {
      const raw = sessionStorage.getItem('zzz_chat_intent') || localStorage.getItem('zzz_chat_intent');
      if (!raw) return;
      sessionStorage.removeItem('zzz_chat_intent');
      localStorage.removeItem('zzz_chat_intent');
      try {
        const intent   = JSON.parse(raw);
        const otherId  = intent.partnerId   || intent.sellerId   || 0;
        const otherName= intent.partnerName || intent.sellerName || 'Seller';
        const listingId= intent.listingId   || 0;
        const initTxt  = intent.initialText || '';
        const existing = allThreads.find(t =>
          t.other_user_id == otherId && String(t.listing_id||0) === String(listingId||0));
        if (existing) openThread(otherId, listingId, otherName);
        else          startNewChatUI(otherId, listingId, otherName, initTxt);
      } catch(e) {}
    }

    function startNewChatUI(otherId, listingId, otherName, initTxt) {
      activeThread = { otherId, listingId: listingId || 0, otherName };
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('chatArea').classList.remove('hidden');
      document.getElementById('activeChat').classList.remove('hidden');
      if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
      document.getElementById('chatName').textContent   = otherName;
      document.getElementById('chatAvatar').textContent = otherName.charAt(0).toUpperCase();
      if (listingId) {
        fetch('/api/listings.php?id=' + listingId, { credentials: 'include' })
          .then(r => r.json()).then(d => {
            if (!d.success) return;
            const l = d.data.listing;
            document.getElementById('contextTitle').textContent = l.title || 'Listing';
            document.getElementById('contextPrice').textContent = '\u20b9' + parseFloat(l.price||0).toLocaleString('en-IN');
            const img = Array.isArray(l.images) && l.images[0] ? l.images[0] : '';
            document.getElementById('contextImg').style.backgroundImage = "url('" + img + "')";
            document.getElementById('contextLink').href = 'Listing Detail.html?id=' + l.id;
          }).catch(() => {});
      }
      document.getElementById('messagesFeed').innerHTML =
        '<div class="text-center text-gray-400 text-sm mt-10 flex flex-col items-center gap-2">' +
        '<span class="material-symbols-outlined text-4xl text-gray-300">waving_hand</span>' +
        '<p>Starting a new chat with <span class="font-bold text-gray-600 dark:text-gray-300">' + esc(otherName) + '</span></p>' +
        '<p class="text-xs">Say Hi! \ud83d\udc4b</p></div>';
      if (initTxt) document.getElementById('msgInput').value = initTxt;
      document.getElementById('msgInput').focus();
    }

    // â”€â”€â”€ 7. HELPERS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function sanitizeInput(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    function setInput(t) { document.getElementById('msgInput').value=t; document.getElementById('msgInput').focus(); }

    function showToast(msg, type) {
      type = type || 'success';
      let c=document.getElementById('zzz-tc');
      if(!c){c=document.createElement('div');c.id='zzz-tc';c.className='fixed bottom-6 right-6 z-[999] flex flex-col gap-2';document.body.appendChild(c);}
      const t=document.createElement('div');
      t.className='flex items-center gap-3 px-5 py-3 rounded-xl shadow-xl text-white font-bold text-sm transition-all duration-300 translate-y-4 opacity-0 ' + (type==='error'?'bg-red-500':'bg-primary');
      t.innerHTML='<span class="material-symbols-outlined text-[18px]">' + (type==='error'?'error':'check_circle') + '</span>' + esc(msg);
      c.appendChild(t); requestAnimationFrame(function(){t.classList.remove('translate-y-4','opacity-0');});
      setTimeout(function(){t.classList.add('translate-y-4','opacity-0');setTimeout(function(){t.remove();},300);},4000);
    }

    // â”€â”€â”€ 8. NAVIGATION â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function closeChatMobile() {
      clearInterval(pollTimer); activeThread=null;
      document.getElementById('activeChat').classList.add('hidden');
      document.getElementById('sidebar').classList.remove('hidden');
      renderList();
    }
    function closeChatDesktop() {
      clearInterval(pollTimer); activeThread=null;
      document.getElementById('activeChat').classList.add('hidden');
      document.getElementById('emptyState').classList.remove('hidden');
      renderList();
    }

    // â”€â”€â”€ 9. EVENTS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    document.getElementById('msgInput').addEventListener('keypress', function(e){ if(e.key==='Enter') sendMessage(); });
    document.getElementById('searchBox').addEventListener('input', renderList);

    // â”€â”€â”€ 10. INIT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    (async function(){ await loadInbox(); checkChatIntent(); })();

  </script>
  <script src="js/utils.js"></script>
</body>
