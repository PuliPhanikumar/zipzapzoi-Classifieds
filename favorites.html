<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (localStorage.getItem('zzz_theme') === 'dark' || (!('zzz_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
  </script>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <meta name="description" content="View your saved and favourite listings on ZipZapZoi. Keep track of the best deals you found."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://zipzapzoi.com/favorites.html"/>
  <meta property="og:title" content="My Favourites — ZipZapZoi"/>
  <meta property="og:description" content="Access your saved listings on ZipZapZoi Classifieds."/>
  <meta property="og:image" content="https://zipzapzoi.com/og-image.png"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://zipzapzoi.com/favorites.html"/>
    <title>ZipZapZoi - My Favorites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#019863",
              secondary: "#4D96A9",
              "background-light": "#f0f4f8",
              "background-dark": "#0f172a",
              "card-dark": "#1e293b"
            },
            fontFamily: { display: "Spline Sans" }
          }
        }
      };
      
      if (localStorage.getItem('zzz_theme') === 'dark' || (!('zzz_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24 }
      
      body { perspective: 1000px; }
      
      .card-3d {
        transform-style: preserve-3d;
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .card-3d:hover {
        transform: translateY(-8px) scale(1.02) rotateX(2deg) rotateY(-2deg);
        box-shadow: 0 30px 50px -15px rgba(0,0,0,0.2);
        z-index: 10;
      }
      .dark .card-3d:hover {
        box-shadow: 0 30px 50px -15px rgba(0,0,0,0.8);
      }
      
      .card-image-wrap { transition: transform 0.5s ease; }
      .card-3d:hover .card-image-wrap { transform: translateZ(20px); }

      .fav-btn {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(4px);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        color: #ef4444; /* active by default in favorites */
      }
      .dark .fav-btn { background: rgba(0,0,0,0.7); }
      .fav-btn:hover { transform: scale(1.15); }

      /* Animation for dissolving card */
      @keyframes dissolve {
        0% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(0.8) translateY(20px); }
      }
      .dissolving { animation: dissolve 0.4s ease forwards; pointer-events: none; }
      
      @keyframes popIn { from { opacity:0; transform: scale(0.9) translateY(20px); } to { opacity:1; transform: scale(1) translateY(0); } }
      .animate-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="font-display min-h-screen flex flex-col bg-background-light dark:bg-background-dark text-gray-800 dark:text-gray-100 transition-colors duration-300">
    
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-card-dark/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800 shadow-sm transition-colors duration-300">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
        <div class="flex items-center justify-between">
          <a href="classifieds.html" class="flex items-center gap-2 group cursor-pointer text-gray-500 hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-2xl">arrow_back</span>
            <span class="font-bold hidden sm:block">Back to Feed</span>
          </a>
          
          <div class="flex items-center gap-4">
            <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
               <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      
      <div class="flex items-end justify-between mb-8 border-b border-gray-200 dark:border-gray-800 pb-4">
        <div>
            <h1 class="text-3xl md:text-4xl font-black text-gray-900 dark:text-white tracking-tight flex items-center gap-3">
                <span class="material-symbols-outlined text-red-500 text-4xl">favorite</span> Saved Items
            </h1>
            <p class="text-gray-500 dark:text-gray-400 font-bold mt-1" id="favCount">0 items saved</p>
        </div>
      </div>

      <div id="favoritesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Rendered via JS -->
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center animate-pop">
         <div class="relative w-32 h-32 mb-6">
             <div class="absolute inset-0 bg-red-100 dark:bg-red-900/30 rounded-full animate-ping opacity-75"></div>
             <div class="relative w-full h-full bg-red-50 dark:bg-red-900/50 rounded-full flex items-center justify-center">
                 <span class="material-symbols-outlined text-6xl text-red-400">favorite_border</span>
             </div>
         </div>
         <h2 class="text-2xl font-black text-gray-900 dark:text-white mb-2">No favorites yet</h2>
         <p class="text-gray-500 dark:text-gray-400 mb-8 max-w-md">Items you heart will magically appear here. Start exploring the marketplace to find things you love!</p>
         <a href="classifieds.html" class="bg-primary hover:bg-green-700 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-xl transition-all transform active:scale-95">
             Explore Marketplace
         </a>
      </div>

    </main>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (document.documentElement.classList.contains('dark')) document.getElementById('themeIcon').textContent = 'light_mode';
        
        const user = window.ZZZ ? window.ZZZ.getCurrentUser() : JSON.parse(localStorage.getItem('zzz_user') || 'null');
        if(!user) {
            window.location.href = 'Login Page.html?redirect=favorites.html';
            return;
        }

        loadFavorites();
      });

      async function loadFavorites() {
        const grid = document.getElementById('favoritesGrid');
        const empty = document.getElementById('emptyState');
        const count = document.getElementById('favCount');

        grid.innerHTML = '<div class="col-span-full py-10 text-center"><div class="animate-pulse flex flex-col items-center"><div class="h-8 w-8 bg-gray-200 rounded-full mb-2"></div><div class="h-4 w-32 bg-gray-200 rounded"></div></div></div>';

        try {
          const res = await (window.ZZZ && window.ZZZ.api ? window.ZZZ.api.fetch('/api/favorites.php') : fetch('/api/favorites.php').then(r => r.json()));
          const favListings = res.data || [];

          if(favListings.length === 0) {
              grid.classList.add('hidden');
              empty.classList.remove('hidden');
              empty.classList.add('flex');
              count.textContent = '0 items saved';
              return;
          }

          grid.classList.remove('hidden');
          empty.classList.add('hidden');
          empty.classList.remove('flex');
          count.textContent = `${favListings.length} item${favListings.length === 1 ? '' : 's'} saved`;

          grid.innerHTML = favListings.map((l, index) => {
            const img = l.thumbnail || l.images?.[0] || l.image || 'https://via.placeholder.com/400x300?text=No+Image';
            return `
              <div id="card-${l.id}" class="card-3d bg-white dark:bg-card-dark rounded-3xl overflow-hidden border border-gray-100 dark:border-gray-800 cursor-pointer relative group opacity-0 animate-pop" style="animation-delay: ${index * 0.05}s" onclick="window.location.href='Listing Detail.html?id=${l.id}'">
                <div class="relative h-48 overflow-hidden bg-gray-100 dark:bg-gray-900">
                  <img src="${img}" loading="lazy" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
                  <div class="absolute top-4 left-4 bg-white/90 dark:bg-black/70 backdrop-blur-sm px-3 py-1 rounded-full text-[10px] font-bold text-gray-800 dark:text-white uppercase tracking-wider card-image-wrap">
                    ${l.category || 'General'}
                  </div>
                  <button onclick="event.stopPropagation(); removeFav('${l.id}')" class="fav-btn absolute top-4 right-4 w-10 h-10 rounded-full flex items-center justify-center card-image-wrap" title="Remove from favorites">
                    <span class="material-symbols-outlined text-xl">favorite</span>
                  </button>
                </div>
                <div class="p-5">
                  <div class="flex justify-between items-start mb-1">
                    <h3 class="text-base font-bold text-gray-900 dark:text-white truncate pr-2">${l.title}</h3>
                    <p class="text-lg font-black text-primary whitespace-nowrap">&#8377;${Number(l.price || 0).toLocaleString('en-IN')}</p>
                  </div>
                  <div class="flex items-center gap-2 text-xs font-bold text-gray-400 dark:text-gray-500 mt-3">
                    <span class="material-symbols-outlined text-[14px]">location_on</span>
                    <span>${l.location_city || l.location || l.city || 'Local'}</span>
                  </div>
                </div>
              </div>`;
          }).join('');
        } catch(e) {
          console.error('Error fetching favorites:', e);
          grid.innerHTML = '<div class="col-span-full py-10 text-center text-red-500 font-bold">Error loading favorites.</div>';
        }
      }

      async function removeFav(id) {
        try {
          const res = await fetch(`/api/favorites.php?listing_id=${id}`, {
            method: 'DELETE',
            credentials: 'include'
          });
          const data = await res.json();
          if (!data.success) {
            console.error('Remove fav error:', data.error);
            showToast('Could not remove from favorites.', 'error');
            return;
          }
        } catch(e) {
          console.error('Remove fav error:', e);
          showToast('Network error. Try again.', 'error');
          return;
        }
        const card = document.getElementById(`card-${id}`);
        if (card) {
          card.classList.add('dissolving');
          setTimeout(() => {
            card.remove();
            const cardsLeft = document.querySelectorAll('#favoritesGrid .card-3d').length;
            document.getElementById('favCount').textContent = `${cardsLeft} item${cardsLeft === 1 ? '' : 's'} saved`;
            if (cardsLeft === 0) {
              document.getElementById('favoritesGrid').classList.add('hidden');
              const empty = document.getElementById('emptyState');
              empty.classList.remove('hidden');
              empty.classList.add('flex');
            }
          }, 400);
        }
      }

      function toggleDarkMode() {
        const dark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('zzz_theme', dark ? 'dark' : 'light');
        document.getElementById('themeIcon').textContent = dark ? 'light_mode' : 'dark_mode';
      }
    </script>
</body>
</html>
