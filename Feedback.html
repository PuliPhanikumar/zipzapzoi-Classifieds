<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZipZapZoi - Feedback & Support</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <!-- Google Fonts: Plus Jakarta Sans for premium feel -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            primary: '#0ea5e9', // Sky blue
            secondary: '#38bdf8'
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .dark body { background-color: #0f172a; }
    
    /* 3D Container Physics */
    .perspective-container {
      perspective: 1200px;
      transform-style: preserve-3d;
    }
    
    /* The Bouncy Card */
    .bouncy-card {
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateZ(0) rotateX(0) rotateY(0);
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
    }
    
    .bouncy-card:hover {
      transform: translateZ(30px) translateY(-10px);
      box-shadow: 0 30px 60px -15px rgba(14, 165, 233, 0.25);
    }

    /* Input fields styling */
    .input-3d {
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.8);
    }
    .dark .input-3d {
      background: rgba(30, 41, 59, 0.8);
      border-color: #334155;
    }
    .input-3d:focus {
      transform: translateZ(10px);
      box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.15);
      border-color: #0ea5e9;
      outline: none;
    }

    /* Button bounce */
    .btn-bounce {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-bounce:hover {
      transform: scale(1.05) translateZ(20px);
      box-shadow: 0 15px 30px -5px rgba(14, 165, 233, 0.4);
    }
    .btn-bounce:active {
      transform: scale(0.95);
    }

    /* Floating blobs background */
    .blob {
      position: absolute;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.5;
      animation: float 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* Toast Notification */
    #toastContainer {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .toast {
      padding: 16px 24px;
      border-radius: 12px;
      background: white;
      color: #0f172a;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .toast.success { border-left: 4px solid #10b981; }
    .toast.error { border-left: 4px solid #ef4444; }
    .dark .toast { background: #1e293b; color: white; }
    @keyframes slideIn {
      from { transform: translateX(100%) scale(0.9); opacity: 0; }
      to { transform: translateX(0) scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="text-gray-800 dark:text-gray-100 min-h-screen flex flex-col relative overflow-x-hidden">

  <!-- Background Effects -->
  <div class="blob bg-blue-400 w-96 h-96 rounded-full top-10 left-10 dark:bg-blue-900/40"></div>
  <div class="blob bg-purple-400 w-96 h-96 rounded-full bottom-10 right-10 dark:bg-purple-900/40" style="animation-delay: -5s;"></div>

  <!-- Header Placeholder (Will be loaded via JS or kept simple here) -->
  <header class="relative z-10 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-gray-200 dark:border-slate-800 sticky top-0">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 group">
        <div class="w-8 h-8 bg-gradient-to-br from-primary to-blue-600 text-white rounded-lg flex items-center justify-center font-bold text-lg shadow-lg group-hover:scale-110 transition-transform">Z</div>
        <span class="font-bold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300">ZipZapZoi</span>
      </a>
      <a href="index.html" class="text-sm font-semibold text-gray-500 hover:text-primary transition-colors flex items-center gap-1">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to Home
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow flex items-center justify-center p-4 relative z-10 perspective-container my-10">
    
    <div class="bouncy-card w-full max-w-2xl bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl rounded-3xl p-8 md:p-12 border border-gray-100 dark:border-slate-700">
      
      <div class="text-center mb-10">
        <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/50 text-primary rounded-2xl flex items-center justify-center mx-auto mb-4 transform rotate-3">
          <span class="material-symbols-outlined text-4xl">volunteer_activism</span>
        </div>
        <h1 class="text-4xl font-extrabold tracking-tight mb-2">We'd love your feedback</h1>
        <p class="text-gray-500 dark:text-gray-400">Found a bug? Have a feature idea? Let us know so we can improve ZipZapZoi for everyone.</p>
      </div>

      <form id="feedbackForm" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Name -->
          <div>
            <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Your Name</label>
            <input type="text" id="fbName" required class="input-3d w-full px-4 py-3 rounded-xl border border-gray-200 dark:text-white" placeholder="John Doe">
          </div>
          
          <!-- Email -->
          <div>
            <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Email Address</label>
            <input type="email" id="fbEmail" required class="input-3d w-full px-4 py-3 rounded-xl border border-gray-200 dark:text-white" placeholder="john@example.com">
          </div>
        </div>

        <!-- Type -->
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">What is this regarding?</label>
          <div class="relative">
            <select id="fbType" class="input-3d w-full px-4 py-3 rounded-xl border border-gray-200 dark:text-white appearance-none cursor-pointer">
              <option value="Feature Request">✨ Feature Request</option>
              <option value="Bug Report">🐛 Bug Report</option>
              <option value="UI/UX Improvement">🎨 Design / UI Improvement</option>
              <option value="General Feedback">💬 General Feedback</option>
              <option value="Other">❓ Other</option>
            </select>
            <span class="material-symbols-outlined absolute right-4 top-3.5 text-gray-400 pointer-events-none">expand_more</span>
          </div>
        </div>

        <!-- Message -->
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Your Message</label>
          <textarea id="fbMessage" required rows="5" class="input-3d w-full px-4 py-3 rounded-xl border border-gray-200 dark:text-white resize-none" placeholder="Tell us what's on your mind..."></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="fbSubmitBtn" class="btn-bounce w-full bg-gradient-to-r from-primary to-blue-600 text-white font-bold text-lg py-4 rounded-xl flex items-center justify-center gap-2 mt-4 relative overflow-hidden group">
          <span class="absolute inset-0 w-full h-full bg-white/20 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></span>
          <span id="btnText">Send Feedback</span>
          <span class="material-symbols-outlined" id="btnIcon">send</span>
        </button>

      </form>

    </div>

  </main>

  <div id="toastContainer"></div>

  <script>
    // Utility for Toasts
    function showToast(msg, type='success') {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      const icon = type === 'success' ? 'check_circle' : 'error';
      el.innerHTML = `<span class="material-symbols-outlined text-[24px] ${type==='success'?'text-green-500':'text-red-500'}">${icon}</span> ${msg}`;
      container.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    // Auto-fill if user is logged in
    document.addEventListener('DOMContentLoaded', () => {
      try {
        const userStr = localStorage.getItem('zzz_user') || localStorage.getItem('zipzapzoi_current_user');
        if (userStr) {
          const user = JSON.parse(userStr);
          if (user.name) document.getElementById('fbName').value = user.name;
          if (user.email) document.getElementById('fbEmail').value = user.email;
        }
      } catch(e) {}
    });

    // Form Submission
    document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('fbSubmitBtn');
      const btnText = document.getElementById('btnText');
      const btnIcon = document.getElementById('btnIcon');
      
      const payload = {
        name: document.getElementById('fbName').value,
        email: document.getElementById('fbEmail').value,
        type: document.getElementById('fbType').value,
        message: document.getElementById('fbMessage').value
      };

      btn.disabled = true;
      btn.style.opacity = '0.7';
      btnText.textContent = 'Sending...';
      btnIcon.className = 'material-symbols-outlined animate-bounce';

      try {
        const res = await fetch('/api/feedback.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        
        if (data.success) {
          showToast(data.data?.message || 'Feedback sent successfully!', 'success');
          // Reset form message
          document.getElementById('fbMessage').value = '';
          
          // Show success state on button
          btn.classList.remove('from-primary', 'to-blue-600');
          btn.classList.add('bg-green-500');
          btnText.textContent = 'Sent Successfully!';
          btnIcon.className = 'material-symbols-outlined';
          btnIcon.textContent = 'task_alt';
          
          setTimeout(() => {
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.classList.add('from-primary', 'to-blue-600');
            btn.classList.remove('bg-green-500');
            btnText.textContent = 'Send Another';
            btnIcon.textContent = 'send';
          }, 3000);
        } else {
          showToast(data.error || 'Failed to send feedback', 'error');
          resetBtn();
        }
      } catch(err) {
        showToast('Network error. Please try again.', 'error');
        resetBtn();
      }

      function resetBtn() {
        btn.disabled = false;
        btn.style.opacity = '1';
        btnText.textContent = 'Send Feedback';
        btnIcon.className = 'material-symbols-outlined';
        btnIcon.textContent = 'send';
      }
    });

    // Dark mode check
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</body>
</html>
