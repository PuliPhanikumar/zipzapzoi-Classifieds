<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ZipZapZoi - Marketplace</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#019863",
              secondary: "#4D96A9",
              "background-light": "#f0f4f8",
              "background-dark": "#0f172a",
              "card-dark": "#1e293b"
            },
            fontFamily: { display: "Spline Sans" },
            boxShadow: {
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
              '3d': '0 20px 40px -10px rgba(0,0,0,0.15)',
              '3d-dark': '0 20px 40px -10px rgba(0,0,0,0.6)'
            }
          }
        }
      };
      
      if (localStorage.getItem('zzz_theme') === 'dark' || (!('zzz_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24 }
      
      /* --- 3D PERSPECTIVE ENGINE --- */
      body { perspective: 1000px; }
      
      .card-3d {
        transform-style: preserve-3d;
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .card-3d:hover {
        transform: translateY(-8px) scale(1.02) rotateX(2deg) rotateY(-2deg);
        box-shadow: 0 30px 50px -15px rgba(0,0,0,0.2);
        z-index: 10;
      }
      .dark .card-3d:hover {
        box-shadow: 0 30px 50px -15px rgba(0,0,0,0.8);
      }
      
      .card-image-wrap {
        transition: transform 0.5s ease;
      }
      .card-3d:hover .card-image-wrap {
        transform: translateZ(20px);
      }

      /* Airbnb Style Category Pill Carousel */
      .cat-carousel {
        display: flex;
        gap: 1rem;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        padding-bottom: 1rem;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .cat-carousel::-webkit-scrollbar { display: none; }
      
      .cat-pill {
        flex: 0 0 auto;
        scroll-snap-align: start;
        transition: all 0.3s;
      }
      .cat-pill:hover { transform: translateY(-3px); }
      .cat-pill.active {
        border-bottom: 3px solid #019863;
        color: #019863;
        opacity: 1;
      }

      /* Favorite Heart */
      .fav-btn {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(4px);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        color: #9ca3af;
      }
      .dark .fav-btn { background: rgba(0,0,0,0.5); }
      .fav-btn:hover { transform: scale(1.15); color: #ef4444; }
      .fav-btn.active { color: #ef4444; }
      .fav-btn.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }

      /* Animations */
      @keyframes popIn { from { opacity:0; transform: scale(0.9) translateY(20px); } to { opacity:1; transform: scale(1) translateY(0); } }
      .animate-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="font-display min-h-screen flex flex-col bg-background-light dark:bg-background-dark text-gray-800 dark:text-gray-100 transition-colors duration-300">
    
    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-card-dark/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800 shadow-sm transition-colors duration-300">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
        <div class="flex items-center justify-between">
          
          <a href="dashboard.html" class="flex items-center gap-2 group cursor-pointer">
            <span class="material-symbols-outlined text-primary text-3xl group-hover:rotate-12 transition-transform">all_inclusive</span>
            <h2 class="text-2xl font-black bg-gradient-to-r from-secondary to-primary bg-clip-text text-transparent tracking-tight">ZipZapZoi</h2>
          </a>
          
          <div class="flex items-center gap-4" id="headerAuthArea">
            <button onclick="toggleDarkMode()" aria-label="Toggle Dark Mode" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex items-center justify-center text-gray-600 dark:text-gray-400">
               <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
            </button>
            <!-- Injected via JS -->
          </div>
        </div>
      </div>
    </header>

    <main class="flex-grow flex flex-col">
      
      <!-- HERO SEARCH BAR -->
      <section class="pt-8 pb-4 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto">
          <div class="bg-white dark:bg-card-dark p-2 rounded-full shadow-lg border border-gray-100 dark:border-gray-800 flex flex-col sm:flex-row items-center gap-2 transform-style-3d hover:shadow-xl transition-shadow">
            
            <div class="flex-1 w-full flex items-center px-6 h-12 border-b sm:border-b-0 sm:border-r border-gray-100 dark:border-gray-800">
              <span class="material-symbols-outlined text-gray-400">search</span>
              <input id="searchQuery" class="w-full bg-transparent border-none focus:ring-0 text-base ml-2 placeholder-gray-400 font-bold dark:text-white" placeholder="What are you looking for?" type="text" onkeypress="if(event.key === 'Enter') executeSearch()"/>
            </div>
            
            <div class="sm:w-1/3 w-full flex items-center px-6 h-12">
              <span class="material-symbols-outlined text-gray-400 cursor-pointer hover:text-primary transition-colors" onclick="alert('Detecting location...')">my_location</span>
              <input id="searchLoc" class="w-full bg-transparent border-none focus:ring-0 text-sm ml-2 placeholder-gray-400 font-bold dark:text-white" placeholder="City or Zip" type="text" onkeypress="if(event.key === 'Enter') executeSearch()"/>
            </div>
            
            <button onclick="executeSearch()" class="w-full sm:w-auto h-12 px-8 bg-primary hover:bg-green-700 text-white font-bold rounded-full shadow-md hover:shadow-lg transition-transform active:scale-95">
              Search
            </button>
          
          </div>
        </div>
      </section>

      <!-- CATEGORY PILL CAROUSEL (Airbnb style) -->
      <section class="border-b border-gray-200 dark:border-gray-800 bg-white/50 dark:bg-card-dark/50 backdrop-blur-md sticky top-[73px] z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-4">
          <div class="cat-carousel" id="categoryCarousel">
            <!-- Rendered via JS -->
          </div>
        </div>
      </section>

      <!-- MAIN CONTENT -->
      <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex flex-col lg:flex-row gap-8">
        
        <!-- SIDEBAR FILTERS (Sticky) -->
        <aside class="w-full lg:w-64 shrink-0">
          <div class="sticky top-[150px] bg-white dark:bg-card-dark p-6 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-sm">
            <h3 class="font-bold text-lg text-gray-900 dark:text-white mb-6 flex items-center gap-2">
              <span class="material-symbols-outlined">tune</span> Filters
            </h3>
            
            <div class="space-y-6">
              <div>
                <label class="block text-sm font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wide">Price Range</label>
                <div class="flex items-center gap-2">
                  <input type="number" id="minPrice" placeholder="Min ₹" class="w-full bg-gray-50 dark:bg-gray-800 border-none rounded-xl text-sm font-bold focus:ring-primary dark:text-white" onchange="renderGrid()">
                  <span class="text-gray-400">-</span>
                  <input type="number" id="maxPrice" placeholder="Max ₹" class="w-full bg-gray-50 dark:bg-gray-800 border-none rounded-xl text-sm font-bold focus:ring-primary dark:text-white" onchange="renderGrid()">
                </div>
              </div>

              <div>
                <label class="block text-sm font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wide">Condition</label>
                <select id="conditionFilter" onchange="renderGrid()" class="w-full bg-gray-50 dark:bg-gray-800 border-none rounded-xl text-sm font-bold focus:ring-primary dark:text-white cursor-pointer">
                  <option value="all">Any Condition</option>
                  <option value="new">Brand New</option>
                  <option value="used">Used</option>
                </select>
              </div>

              <div class="pt-4 border-t border-gray-100 dark:border-gray-800">
                <button onclick="clearFilters()" class="w-full py-2.5 bg-red-50 dark:bg-red-900/20 text-red-500 font-bold rounded-xl hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors text-sm">Clear Filters</button>
              </div>
            </div>
          </div>
        </aside>

        <!-- 3D GRID -->
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-center mb-6">
            <h2 id="gridTitle" class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">Fresh Recommendations</h2>
            <select id="sortFilter" onchange="renderGrid()" class="bg-transparent text-sm font-bold text-gray-600 dark:text-gray-300 border-none focus:ring-0 cursor-pointer">
              <option value="newest">Newest First</option>
              <option value="price_low">Price: Low to High</option>
              <option value="price_high">Price: High to Low</option>
            </select>
          </div>

          <div id="listingsGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
            <!-- 3D Cards rendered here via JS -->
          </div>
        </div>

      </section>
    </main>

      <script src="js/schema.js"></script>
      <script src="js/utils.js"></script>
      <script>
      // =====================================
      // 1. DATA & STATE
      // =====================================
      const categories = [{ id: 'All', icon: 'explore', label: 'Explore' }, ...window.ZZZ_SCHEMA.categories];

      let activeCategory = 'All';
      let allListings = JSON.parse(localStorage.getItem('zzz_listings') || '[]');
      const currentUser = JSON.parse(localStorage.getItem('zzz_user') || 'null');

      // =====================================
      // 2. INITIALIZATION
      // =====================================
      document.addEventListener('DOMContentLoaded', () => {
        if (document.documentElement.classList.contains('dark')) document.getElementById('themeIcon').textContent = 'light_mode';
        renderAuth();
        renderCategories();
        renderGrid();
      });

      // =====================================
      // 3. AUTH RENDER
      // =====================================
      function renderAuth() {
        const authArea = document.getElementById('headerAuthArea');
        const toggleBtn = `<button onclick="toggleDarkMode()" aria-label="Toggle Dark Mode" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex items-center justify-center text-gray-600 dark:text-gray-400 mr-2"><span class="material-symbols-outlined" id="themeIcon">dark_mode</span></button>`;
        
        if(currentUser) {
          authArea.innerHTML = toggleBtn + `
            <a href="Post Listing.html" class="hidden md:flex items-center gap-2 py-2 px-4 rounded-full bg-primary/10 text-primary hover:bg-primary hover:text-white font-bold text-sm transition-colors">
              <span class="material-symbols-outlined text-lg">add_circle</span> Post Ad
            </a>
            <div class="flex items-center gap-2">
              <a href="favorites.html" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400 transition-colors relative" title="Favorites">
                <span class="material-symbols-outlined">favorite</span>
              </a>
              <a href="Inbox.html" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400 transition-colors relative" title="Messages">
                <span class="material-symbols-outlined">chat</span>
              </a>
              <a href="Seller Dashboard.html" class="w-10 h-10 rounded-full bg-gradient-to-br from-secondary to-primary text-white flex items-center justify-center font-bold shadow-md cursor-pointer border-2 border-transparent hover:border-white transition-all ml-2">
                ${currentUser.name.charAt(0).toUpperCase()}
              </a>
            </div>
          `;
        } else {
          authArea.innerHTML = toggleBtn + `
            <a href="Login Page.html?redirect=classifieds.html" class="text-sm font-bold text-gray-600 dark:text-gray-300 hover:text-primary transition-colors">Log In</a>
            <a href="User Registration.html" class="text-sm font-bold bg-primary text-white py-2.5 px-6 rounded-full shadow-lg hover:shadow-primary/30 transition-transform active:scale-95 ml-2">Sign Up</a>
          `;
        }
        
        // Update the icon immediately based on current state
        if (document.documentElement.classList.contains('dark')) {
            const icon = document.getElementById('themeIcon');
            if(icon) icon.textContent = 'light_mode';
        }
      }

      // =====================================
      // 4. CATEGORY CAROUSEL
      // =====================================
      function renderCategories() {
        const carousel = document.getElementById('categoryCarousel');
        carousel.innerHTML = categories.map(c => `
          <div onclick="setCategory('${c.id}')" class="cat-pill cursor-pointer flex flex-col items-center gap-2 min-w-[80px] pb-2 ${c.id === activeCategory ? 'active' : 'text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200 opacity-60 hover:opacity-100'}">
            <span class="material-symbols-outlined text-2xl">${c.icon}</span>
            <span class="text-xs font-bold whitespace-nowrap">${c.label}</span>
          </div>
        `).join('');
      }

      function setCategory(cat) {
        activeCategory = cat;
        document.getElementById('gridTitle').textContent = cat === 'All' ? 'Fresh Recommendations' : `${cat} Listings`;
        renderCategories();
        renderGrid();
      }

      // =====================================
      // 5. 3D GRID RENDER
      // =====================================
      function renderGrid() {
        const grid = document.getElementById('listingsGrid');
        
        // 1. Filter Category
        let filtered = activeCategory === 'All' ? allListings : allListings.filter(l => l.category === activeCategory);
        
        // 2. Filter Search Box (for instant filtering if implemented)
        const q = document.getElementById('searchQuery').value.toLowerCase();
        if(q) filtered = filtered.filter(l => l.title.toLowerCase().includes(q) || l.description.toLowerCase().includes(q));

        // 3. Filter Sidebar
        const minP = document.getElementById('minPrice').value;
        const maxP = document.getElementById('maxPrice').value;
        const cond = document.getElementById('conditionFilter').value;

        if(minP) filtered = filtered.filter(l => l.price >= parseFloat(minP));
        if(maxP) filtered = filtered.filter(l => l.price <= parseFloat(maxP));
        if(cond !== 'all') filtered = filtered.filter(l => (l.condition || 'used').toLowerCase() === cond);

        // 4. Sort
        const sort = document.getElementById('sortFilter').value;
        if(sort === 'price_low') filtered.sort((a,b) => a.price - b.price);
        if(sort === 'price_high') filtered.sort((a,b) => b.price - a.price);
        if(sort === 'newest') filtered.reverse(); // Simplified newest

        // 5. Render
        if(filtered.length === 0) {
          grid.innerHTML = `
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-center animate-pop">
              <span class="material-symbols-outlined text-6xl text-gray-300 dark:text-gray-600 mb-4">search_off</span>
              <h3 class="text-xl font-bold text-gray-800 dark:text-white">No results found</h3>
              <p class="text-gray-500 dark:text-gray-400 mt-2">Try adjusting your filters or search query.</p>
              <button onclick="clearFilters()" class="mt-6 font-bold text-primary hover:underline">Clear Filters</button>
            </div>
          `;
          return;
        }

        const favs = JSON.parse(localStorage.getItem('zzz_favorites') || '[]');

        grid.innerHTML = filtered.map((l, index) => {
          const isFav = favs.includes(l.id);
          const timeDelay = index * 0.05; // Cascade animation

          return `
            <div class="card-3d bg-white dark:bg-card-dark rounded-3xl overflow-hidden border border-gray-100 dark:border-gray-800 cursor-pointer relative group opacity-0 animate-pop" style="animation-delay: ${timeDelay}s" onclick="window.location.href='Listing Detail.html?id=${l.id}'">
              
              <!-- Image Area -->
              <div class="relative h-56 overflow-hidden bg-gray-100 dark:bg-gray-900">
                <img src="${l.images?.[0] || 'https://via.placeholder.com/400x300?text=No+Image'}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                
                <!-- Category Badge -->
                <div class="absolute top-4 left-4 bg-white/90 dark:bg-black/70 backdrop-blur-sm px-3 py-1 rounded-full text-[10px] font-bold text-gray-800 dark:text-white uppercase tracking-wider card-image-wrap">
                  ${l.category}
                </div>

                <!-- Favorite Button (Stop Propagation to prevent navigation) -->
                <button onclick="event.stopPropagation(); toggleFav('${l.id}', this)" class="fav-btn absolute top-4 right-4 w-10 h-10 rounded-full flex items-center justify-center card-image-wrap ${isFav ? 'active' : ''}">
                  <span class="material-symbols-outlined text-xl">favorite</span>
                </button>
              </div>

              <!-- Details Area -->
              <div class="p-6">
                <div class="flex justify-between items-start mb-2">
                  <h3 class="text-lg font-bold text-gray-900 dark:text-white truncate pr-4">${l.title}</h3>
                  <p class="text-xl font-black text-primary">₹${l.price.toLocaleString()}</p>
                </div>
                
                <p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-2 mb-4">${l.description}</p>
                
                <div class="flex items-center gap-4 text-xs font-bold text-gray-400 dark:text-gray-500 pt-4 border-t border-gray-100 dark:border-gray-800">
                  <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">location_on</span> ${l.location || 'Local'}</span>
                  <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">schedule</span> ${l.date || 'Just now'}</span>
                </div>
              </div>

            </div>
          `;
        }).join('');
      }

      // =====================================
      // 6. ACTIONS
      // =====================================
      function executeSearch() {
        const q = document.getElementById('searchQuery').value;
        const loc = document.getElementById('searchLoc').value;
        if(q || loc) {
          window.location.href = `SearchResult.html?q=${encodeURIComponent(q)}&loc=${encodeURIComponent(loc)}`;
        }
      }

      function clearFilters() {
        document.getElementById('minPrice').value = '';
        document.getElementById('maxPrice').value = '';
        document.getElementById('conditionFilter').value = 'all';
        document.getElementById('searchQuery').value = '';
        renderGrid();
      }

      function toggleFav(id, btn) {
        if(!currentUser) {
          window.location.href = `Login Page.html?redirect=classifieds.html`;
          return;
        }
        let favs = JSON.parse(localStorage.getItem('zzz_favorites') || '[]');
        if(favs.includes(id)) {
          favs = favs.filter(f => f !== id);
          btn.classList.remove('active');
        } else {
          favs.push(id);
          btn.classList.add('active');
        }
        localStorage.setItem('zzz_favorites', JSON.stringify(favs));
      }
    </script>
</body>
</html>
